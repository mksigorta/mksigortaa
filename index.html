<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MKÖÇE Poliçe Takip Sistemi</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ═══════════════════════════════════════════
   MKÖÇE POLİÇE TAKİP — 10 TEMA SİSTEMİ
═══════════════════════════════════════════ */

/* ── ORMAN YEŞİLİ (varsayılan) ── */
:root,[data-tema="orman"]{
  --bg:#f0f9f4; --surf:#ffffff; --surf2:#f0fdf4; --brd:#bbf7d0; --brd2:#d1fae5;
  --acc:#059669; --acc2:#10b981; --acc3:#34d399; --acc-dark:#064e3b; --acc-deep:#022c22;
  --ok:#16a34a; --warn:#d97706; --err:#dc2626; --blue:#2563eb;
  --muted:#6b7280; --txt:#1a2e1a; --hdr:#064e3b; --hdr-acc:#34d399;
  --hdr-g1:#022c22; --hdr-g2:#064e3b; --hdr-g3:#065f46;
  --hdr-sh:rgba(2,44,34,.5); --hdr-btn:rgba(52,211,153,.7);
  --hdr-btn-hover:rgba(52,211,153,.15); --hdr-btn-active:rgba(52,211,153,.22);
  --inp-bg:#f0fdf4; --radius:10px;
  --sh:0 2px 12px rgba(5,150,105,.09); --sh2:0 8px 28px rgba(5,150,105,.16); --sh3:0 2px 8px rgba(0,0,0,.07);
}

/* ── MAVİ ── */
[data-tema="mavi"]{
  --bg:#f0f6ff; --surf:#ffffff; --surf2:#eff6ff; --brd:#bfdbfe; --brd2:#dbeafe;
  --acc:#2563eb; --acc2:#3b82f6; --acc3:#60a5fa; --acc-dark:#1e3a8a; --acc-deep:#172554;
  --ok:#16a34a; --warn:#d97706; --err:#dc2626; --blue:#2563eb;
  --muted:#6b7280; --txt:#1e2a4a; --hdr:#1e3a8a; --hdr-acc:#60a5fa;
  --hdr-g1:#172554; --hdr-g2:#1e3a8a; --hdr-g3:#1d4ed8;
  --hdr-sh:rgba(23,37,84,.5); --hdr-btn:rgba(96,165,250,.7);
  --hdr-btn-hover:rgba(96,165,250,.15); --hdr-btn-active:rgba(96,165,250,.22);
  --inp-bg:#eff6ff;
  --sh:0 2px 12px rgba(37,99,235,.09); --sh2:0 8px 28px rgba(37,99,235,.16); --sh3:0 2px 8px rgba(0,0,0,.07);
}

/* ── SARI ── */
[data-tema="sari"]{
  --bg:#fffdf0; --surf:#ffffff; --surf2:#fefce8; --brd:#fde68a; --brd2:#fef08a;
  --acc:#d97706; --acc2:#f59e0b; --acc3:#fbbf24; --acc-dark:#78350f; --acc-deep:#451a03;
  --ok:#16a34a; --warn:#d97706; --err:#dc2626; --blue:#2563eb;
  --muted:#78716c; --txt:#2c1a00; --hdr:#78350f; --hdr-acc:#fbbf24;
  --hdr-g1:#451a03; --hdr-g2:#78350f; --hdr-g3:#92400e;
  --hdr-sh:rgba(69,26,3,.5); --hdr-btn:rgba(251,191,36,.7);
  --hdr-btn-hover:rgba(251,191,36,.15); --hdr-btn-active:rgba(251,191,36,.22);
  --inp-bg:#fefce8;
  --sh:0 2px 12px rgba(217,119,6,.09); --sh2:0 8px 28px rgba(217,119,6,.16); --sh3:0 2px 8px rgba(0,0,0,.07);
}

/* ── GRİ TON ── */
[data-tema="gri"]{
  --bg:#f4f5f7; --surf:#ffffff; --surf2:#f8f9fa; --brd:#d1d5db; --brd2:#e5e7eb;
  --acc:#4b5563; --acc2:#6b7280; --acc3:#9ca3af; --acc-dark:#1f2937; --acc-deep:#111827;
  --ok:#16a34a; --warn:#d97706; --err:#dc2626; --blue:#2563eb;
  --muted:#6b7280; --txt:#111827; --hdr:#1f2937; --hdr-acc:#9ca3af;
  --hdr-g1:#111827; --hdr-g2:#1f2937; --hdr-g3:#374151;
  --hdr-sh:rgba(17,24,39,.5); --hdr-btn:rgba(156,163,175,.7);
  --hdr-btn-hover:rgba(156,163,175,.15); --hdr-btn-active:rgba(156,163,175,.22);
  --inp-bg:#f9fafb;
  --sh:0 2px 12px rgba(75,85,99,.09); --sh2:0 8px 28px rgba(75,85,99,.16); --sh3:0 2px 8px rgba(0,0,0,.07);
}

/* ── ANDRASİT ── */
[data-tema="andrasit"]{
  --bg:#1c2128; --surf:#22272e; --surf2:#2d333b; --brd:#444c56; --brd2:#373e47;
  --acc:#539bf5; --acc2:#6cb6ff; --acc3:#96d0ff; --acc-dark:#cdd9e5; --acc-deep:#adbac7;
  --ok:#46954a; --warn:#c69026; --err:#e5534b; --blue:#539bf5;
  --muted:#768390; --txt:#cdd9e5; --hdr:#161b22; --hdr-acc:#539bf5;
  --hdr-g1:#0d1117; --hdr-g2:#161b22; --hdr-g3:#21262d;
  --hdr-sh:rgba(0,0,0,.6); --hdr-btn:rgba(83,155,245,.7);
  --hdr-btn-hover:rgba(83,155,245,.15); --hdr-btn-active:rgba(83,155,245,.22);
  --inp-bg:#2d333b;
  --sh:0 2px 12px rgba(0,0,0,.25); --sh2:0 8px 28px rgba(0,0,0,.4); --sh3:0 2px 8px rgba(0,0,0,.3);
}

/* ── SİYAH ── */
[data-tema="siyah"]{
  --bg:#0a0a0a; --surf:#141414; --surf2:#1a1a1a; --brd:#2a2a2a; --brd2:#222222;
  --acc:#e2e8f0; --acc2:#cbd5e1; --acc3:#94a3b8; --acc-dark:#f1f5f9; --acc-deep:#f8fafc;
  --ok:#22c55e; --warn:#f59e0b; --err:#ef4444; --blue:#60a5fa;
  --muted:#64748b; --txt:#e2e8f0; --hdr:#000000; --hdr-acc:#475569;
  --hdr-g1:#000000; --hdr-g2:#0a0a0a; --hdr-g3:#111111;
  --hdr-sh:rgba(0,0,0,.8); --hdr-btn:rgba(71,85,105,.7);
  --hdr-btn-hover:rgba(71,85,105,.25); --hdr-btn-active:rgba(71,85,105,.4);
  --inp-bg:#1e1e1e;
  --sh:0 2px 12px rgba(0,0,0,.4); --sh2:0 8px 28px rgba(0,0,0,.6); --sh3:0 2px 8px rgba(0,0,0,.4);
}

/* ── AÇIK MAVİ ── */
[data-tema="acikMavi"]{
  --bg:#e0f2fe; --surf:#ffffff; --surf2:#f0f9ff; --brd:#bae6fd; --brd2:#e0f2fe;
  --acc:#0284c7; --acc2:#0ea5e9; --acc3:#38bdf8; --acc-dark:#0c4a6e; --acc-deep:#082f49;
  --ok:#16a34a; --warn:#d97706; --err:#dc2626; --blue:#0284c7;
  --muted:#64748b; --txt:#0c2a3e; --hdr:#0369a1; --hdr-acc:#38bdf8;
  --hdr-g1:#082f49; --hdr-g2:#0c4a6e; --hdr-g3:#075985;
  --hdr-sh:rgba(8,47,73,.5); --hdr-btn:rgba(56,189,248,.7);
  --hdr-btn-hover:rgba(56,189,248,.15); --hdr-btn-active:rgba(56,189,248,.22);
  --inp-bg:#f0f9ff;
  --sh:0 2px 12px rgba(2,132,199,.09); --sh2:0 8px 28px rgba(2,132,199,.16); --sh3:0 2px 8px rgba(0,0,0,.07);
}

/* ── TURKUAZ ── */
[data-tema="turkuaz"]{
  --bg:#ecfeff; --surf:#ffffff; --surf2:#f0fdfe; --brd:#a5f3fc; --brd2:#cffafe;
  --acc:#0891b2; --acc2:#06b6d4; --acc3:#22d3ee; --acc-dark:#164e63; --acc-deep:#083344;
  --ok:#16a34a; --warn:#d97706; --err:#dc2626; --blue:#2563eb;
  --muted:#6b7280; --txt:#0e3a44; --hdr:#155e75; --hdr-acc:#22d3ee;
  --hdr-g1:#083344; --hdr-g2:#164e63; --hdr-g3:#155e75;
  --hdr-sh:rgba(8,51,68,.5); --hdr-btn:rgba(34,211,238,.7);
  --hdr-btn-hover:rgba(34,211,238,.15); --hdr-btn-active:rgba(34,211,238,.22);
  --inp-bg:#ecfeff;
  --sh:0 2px 12px rgba(8,145,178,.09); --sh2:0 8px 28px rgba(8,145,178,.16); --sh3:0 2px 8px rgba(0,0,0,.07);
}

/* ── DOĞA YEŞİLİ ── */
[data-tema="doga"]{
  --bg:#f7fdf4; --surf:#ffffff; --surf2:#f0fdf4; --brd:#bbf7d0; --brd2:#dcfce7;
  --acc:#16a34a; --acc2:#22c55e; --acc3:#4ade80; --acc-dark:#14532d; --acc-deep:#052e16;
  --ok:#16a34a; --warn:#d97706; --err:#dc2626; --blue:#2563eb;
  --muted:#6b7280; --txt:#14291e; --hdr:#15803d; --hdr-acc:#4ade80;
  --hdr-g1:#052e16; --hdr-g2:#14532d; --hdr-g3:#15803d;
  --hdr-sh:rgba(5,46,22,.5); --hdr-btn:rgba(74,222,128,.7);
  --hdr-btn-hover:rgba(74,222,128,.15); --hdr-btn-active:rgba(74,222,128,.22);
  --inp-bg:#f0fdf4;
  --sh:0 2px 12px rgba(22,163,74,.09); --sh2:0 8px 28px rgba(22,163,74,.16); --sh3:0 2px 8px rgba(0,0,0,.07);
}

/* ── MAVİ TONU (Lacivert) ── */
[data-tema="lacivert"]{
  --bg:#eef2ff; --surf:#ffffff; --surf2:#eef2ff; --brd:#c7d2fe; --brd2:#e0e7ff;
  --acc:#4f46e5; --acc2:#6366f1; --acc3:#818cf8; --acc-dark:#1e1b4b; --acc-deep:#0f0e2b;
  --ok:#16a34a; --warn:#d97706; --err:#dc2626; --blue:#4f46e5;
  --muted:#6b7280; --txt:#1e1b4b; --hdr:#312e81; --hdr-acc:#818cf8;
  --hdr-g1:#0f0e2b; --hdr-g2:#1e1b4b; --hdr-g3:#312e81;
  --hdr-sh:rgba(15,14,43,.5); --hdr-btn:rgba(129,140,248,.7);
  --hdr-btn-hover:rgba(129,140,248,.15); --hdr-btn-active:rgba(129,140,248,.22);
  --inp-bg:#eef2ff;
  --sh:0 2px 12px rgba(79,70,229,.09); --sh2:0 8px 28px rgba(79,70,229,.16); --sh3:0 2px 8px rgba(0,0,0,.07);
}

/* ── TEMA PANELİ ── */
#temaWrap{position:relative;margin-left:4px;}
#temaPanel{
  display:none;position:absolute;right:0;top:calc(100% + 8px);
  background:var(--surf);border:1.5px solid var(--brd2);
  border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.25);
  z-index:9000;padding:12px;width:260px;
  animation:tpIn .18s ease;
}
@keyframes tpIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
#temaPanel h5{
  font-size:9.5px;font-weight:800;color:var(--muted);
  text-transform:uppercase;letter-spacing:.7px;
  margin-bottom:9px;padding-bottom:7px;border-bottom:1.5px solid var(--brd2);
}
#temaGrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.ti{
  display:flex;align-items:center;gap:7px;padding:7px 9px;
  border:1.5px solid var(--brd2);border-radius:8px;
  background:var(--surf2);cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;color:var(--txt);
  transition:all .14s;
}
.ti:hover{border-color:var(--acc);color:var(--acc);}
.ti.ak{background:var(--acc);color:#fff;border-color:var(--acc);}
.tdot{width:11px;height:11px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,.12);}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Nunito',sans-serif;
  font-size:13px;
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
}

/* ── TOOLBAR ── */
#toolbar{
  background:linear-gradient(135deg,var(--hdr-g1) 0%,var(--hdr-g2) 60%,var(--hdr-g3) 100%);
  padding:0 14px;
  display:flex;align-items:center;gap:2px;
  border-bottom:3px solid var(--hdr-acc);
  box-shadow:0 3px 14px var(--hdr-sh);
  flex-wrap:wrap;min-height:62px;
  position:sticky;top:0;z-index:100;
  position:relative;
}
#toolbar::after{
  content:'';position:absolute;bottom:-3px;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--hdr-acc),var(--acc2),var(--hdr-acc));
  background-size:200% 100%;
  animation:shimmer 3s linear infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.tb-title{
  font-size:14px;font-weight:900;color:var(--hdr-acc);
  letter-spacing:1.2px;margin-right:10px;white-space:nowrap;
  display:flex;align-items:center;gap:7px;
}
.tb-title span{color:var(--acc3);font-weight:600;}

.tb-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:7px 10px;border:none;background:transparent;
  color:var(--hdr-btn);cursor:pointer;border-radius:8px;
  font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.4px;transition:all .15s;white-space:nowrap;min-width:56px;
}
.tb-btn .ico{font-size:20px;line-height:1;}
.tb-btn:hover{background:var(--hdr-btn-hover);color:var(--hdr-acc);}
.tb-btn.active{
  background:var(--hdr-btn-active);
  color:var(--hdr-acc);
  border-bottom:2px solid var(--hdr-acc);
}

#clock-bar{margin-left:auto;text-align:right;color:var(--acc3);font-size:11px;line-height:1.6;opacity:.85;}
#clock-bar .ct{color:var(--hdr-acc);font-weight:700;font-size:12px;}

/* ── SAYFA ── */
#pg{padding:14px;max-width:1400px;margin:0 auto;}

/* ── KART ── */
.card{
  background:var(--surf);
  border:1.5px solid var(--brd2);
  border-radius:var(--radius);
  padding:14px;margin-bottom:12px;
  box-shadow:var(--sh);
}
.card-title{
  font-size:12px;font-weight:800;color:var(--acc-dark);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;
  display:flex;align-items:center;gap:7px;
  border-bottom:2px solid var(--brd2);padding-bottom:9px;
}

/* ── FORM ── */
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-bottom:8px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
label.lbl{display:block;font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;}

input,select,textarea{
  width:100%;padding:7px 9px;
  background:var(--inp-bg);border:1.5px solid var(--brd2);
  border-radius:6px;color:var(--txt);
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;
  outline:none;transition:border-color .18s,box-shadow .18s;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--acc);
  background:#fff;
  box-shadow:0 0 0 3px rgba(16,185,129,.12);
}
textarea{resize:vertical;min-height:58px;}

/* ── BUTONLAR ── */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 14px;border:none;border-radius:7px;
  cursor:pointer;font-family:'Nunito',sans-serif;
  font-size:12px;font-weight:800;transition:all .14s;
  letter-spacing:.2px;white-space:nowrap;
}
.btn:active{transform:scale(.96);}

.btn-primary{background:var(--acc);color:#fff;}
.btn-primary:hover{background:#047857;box-shadow:0 3px 10px rgba(5,150,105,.35);}

.btn-success{background:var(--ok);color:#fff;}
.btn-success:hover{background:#15803d;box-shadow:0 3px 10px rgba(22,163,74,.35);}

.btn-danger{background:var(--err);color:#fff;}
.btn-danger:hover{background:#b91c1c;}

.btn-warn{background:var(--warn);color:#fff;}
.btn-warn:hover{background:#b45309;}

.btn-ghost{
  background:#f0fdf4;border:1.5px solid var(--brd2);color:#059669;
}
.btn-ghost:hover{border-color:var(--acc);background:#dcfce7;color:#047857;}

.btn-sm{padding:5px 10px;font-size:11px;}
.btn-xs{padding:3px 8px;font-size:10.5px;}
.bgrp{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}

/* ── TABLO ── */
.twrap{overflow-x:auto;border-radius:9px;border:1.5px solid var(--brd2);}
table{width:100%;border-collapse:collapse;font-size:11.5px;min-width:480px;}
thead tr{background:linear-gradient(135deg,var(--acc-dark),#065f46);}
thead th{
  padding:9px 9px;color:#6ee7b7;font-weight:700;font-size:9.5px;
  text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;
  border-bottom:1px solid #065f46;text-align:left;
}
tbody td{padding:7px 9px;border-bottom:1px solid #ecfdf5;vertical-align:middle;}
tbody tr:hover td{background:#f0fdf4;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:nth-child(even) td{background:#f9fefb;}
tbody tr:nth-child(even):hover td{background:#f0fdf4;}
.tdact{display:flex;gap:3px;flex-wrap:wrap;}

/* ── BADGE ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9.5px;font-weight:800;letter-spacing:.3px;white-space:nowrap;}
.badge-ok{background:#dcfce7;color:#15803d;border:1px solid #86efac;}
.badge-err{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;}
.badge-warn{background:#fef3c7;color:#92400e;border:1px solid #fcd34d;}
.badge-blue{background:#dcfce7;color:#1d4ed8;border:1px solid #93c5fd;}
.badge-gray{background:#f0fdf4;color:#059669;border:1px solid #bbf7d0;}

/* ── STAT KUTU ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:12px;}
.stat-box{
  background:var(--surf);border:1.5px solid var(--brd2);
  border-radius:var(--radius);padding:14px 10px;text-align:center;
  cursor:pointer;transition:all .18s;box-shadow:var(--sh);
  position:relative;overflow:hidden;
}
.stat-box::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--acc),var(--acc3));
  transform:scaleX(0);transition:transform .2s;
}
.stat-box:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:var(--sh2);}
.stat-box:hover::after{transform:scaleX(1);}
.stat-box .sv{font-size:26px;font-weight:900;color:var(--acc);}
.stat-box .sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:3px;font-weight:700;}
.stat-box.warn .sv{color:var(--warn);}
.stat-box.warn::after{background:linear-gradient(90deg,#d97706,#fbbf24);}
.stat-box.danger .sv{color:var(--err);}
.stat-box.danger::after{background:linear-gradient(90deg,#dc2626,#f87171);}
.stat-box.ok .sv{color:var(--ok);}

/* ── MODAL ── */
.movl{position:fixed;inset:0;background:rgba(2,44,34,.65);z-index:2000;display:flex;align-items:center;justify-content:center;padding:12px;backdrop-filter:blur(6px);}
.modal{
  background:var(--surf);border-radius:14px;width:100%;max-width:640px;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(2,44,34,.4);
  border:1.5px solid var(--brd2);
}
.modal.wide{max-width:800px;}
.mhdr{
  padding:14px 16px;
  border-bottom:2px solid var(--brd2);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:var(--surf);z-index:1;
}
.mhdr h3{font-size:14px;font-weight:900;color:var(--acc-dark);text-transform:uppercase;letter-spacing:.7px;}
.mbody{padding:14px 16px;}
.mfoot{
  padding:10px 16px;border-top:1.5px solid var(--brd2);
  display:flex;gap:7px;justify-content:flex-end;
  background:#f9fefb;border-radius:0 0 14px 14px;
}
.mclose{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:3px 7px;border-radius:4px;font-weight:700;}
.mclose:hover{color:var(--err);background:#fee2e2;}

/* ── DRAWER ── */
.dovl{position:fixed;inset:0;background:rgba(2,44,34,.55);z-index:1800;display:flex;justify-content:flex-end;backdrop-filter:blur(3px);}
.drawer{
  background:var(--surf);width:min(460px,100%);height:100%;
  overflow-y:auto;border-left:2px solid var(--brd2);box-shadow:var(--sh2);
}
.dhdr{
  padding:13px 16px;border-bottom:2px solid #065f46;
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;
  background:linear-gradient(135deg,#064e3b,#065f46);z-index:1;
}
.dhdr h3{font-size:14px;font-weight:900;color:#34d399;letter-spacing:.6px;}

async function sbFetchAll(tbl){

  const {data,error}=await sb.from(tbl).select('id,data');
  if(error){console.error('sbFetch',tbl,error);return[];}
  return (data||[]).map(r=>({...r.data,id:r.id}));
}

// Tek kayıt upsert (insert veya update)
async function sbUpsert(tbl,obj){
  const sb=getSupa();if(!sb){console.warn('Supabase bağlı değil');return;}
  const {id,...rest}=obj;
  if(!id){console.error('sbUpsert: id eksik',tbl,obj);return;}
  const {error}=await sb.from(tbl).upsert({id,data:rest},{onConflict:'id'});
  if(error){console.error('❌ sbUpsert hatası:',tbl,id,error.message);}
  else{console.log('✓ Kaydedildi:',tbl,id);}
}

// Toplu upsert (dizi)
async function sbUpsertMany(tbl,arr){
  const sb=getSupa();if(!sb){console.warn('Supabase bağlı değil');return;}
  if(!arr||!arr.length)return;
  const rows=arr.map(obj=>{const{id,...rest}=obj;return{id,data:rest};});

}

/* ── TÜM VERİLERİ SUPABASE'DEN YÜKLe ── */
async function loadAllFromSupabase(){
  /* ── 1) ÖNCE GİRİŞ EKRANINI GÖSTER ─────────────────────────
     Kullanıcı hemen şifre ekranını görür; veriler arka planda yüklenir.
     Giriş yapıldıktan sonra veriler zaten hazır olur.
  ─────────────────────────────────────────────────────────── */
  showLoginScreen();

  try {
    /* ── 2) TÜM TABLOLARI PARALEL ÇEK (Promise.all) ──────────
       Sırayla değil, hepsi aynı anda → ~10x daha hızlı
    ─────────────────────────────────────────────────────────── */
    const [
      musteriler, policeler, acenteler, aceTahsilat,
      cariler, cariHrkt, iptallar, hatirlatma,
      polTurleri, ayarlarArr, kullanicilar
    ] = await Promise.all([
      sbFetchAll('musteriler'),
      sbFetchAll('policeler'),
      sbFetchAll('acenteler'),
      sbFetchAll('ace_tahsilat'),
      sbFetchAll('cariler'),
      sbFetchAll('cari_hrkt'),
      sbFetchAll('iptallar'),
      sbFetchAll('hatirlatma'),
      sbFetchAll('pol_turleri'),
      sbFetchAll('ayarlar'),
      sbFetchAll('kullanicilar')
    ]);

    /* ── 3) DB'YE YAZ ── */
    DB.musteriler        = musteriler;
    DB.policeler         = policeler;
    DB.acenteler         = acenteler;
    DB.acenteTahsilatlar = aceTahsilat;
    DB.cariler           = cariler;
    DB.cariHareketler    = cariHrkt;
    DB.iptallar          = iptallar;
    DB.hatirlatmalar     = hatirlatma;
    DB.kullanicilar      = kullanicilar;

    /* ── Poliçe türleri ── */
    DB.policeTurleri = polTurleri.length
      ? polTurleri.map(r=>r.tur||r.id)
      : ['1 - TRAFİK SİG.','2 - KASKO SİG.','3 - DASK SİG.','4 - KONUT SİG.',
         '5 - TSS SİG.','6 - İŞ YERİ SİG.','TRAFİK','KASKO','KONUT','DASK','SAĞLIK'];
    if(!polTurleri.length){
      sbUpsertMany(TBL.policeTurleri, DB.policeTurleri.map((t,i)=>({id:'tur_'+i,tur:t})));
    }

    /* ── Ayarlar ── */
    const cfgRow = ayarlarArr.find(r=>r.id==='cfg');
    if(cfgRow){
      DB.cfg={
        sirket:    cfgRow.sirket    || 'MK MUHAMMED KÖÇE',
        uyariGun:  cfgRow.uyariGun  || 30,
        sifre:     cfgRow.sifre     || '1234',
        loginSifre:cfgRow.loginSifre|| '1234',
        loginMod:  cfgRow.loginMod  || 'tekSifre'
      };
      LS.setObj('cfg', DB.cfg);
    }

    /* ── 4) GİRİŞ EKRANINI GÜNCELLE (şifre/mod değişmiş olabilir) ── */
    showLoginScreen();

    console.log(`✓ Yüklendi: ${DB.musteriler.length} müşteri, ${DB.policeler.length} poliçe, ${DB.kullanicilar.length} kullanıcı`);

  } catch(e){
    console.error('Yükleme hatası:', e);
    /* Giriş ekranında hata bildirimi göster */
    const errDiv = document.createElement('div');
    errDiv.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#b91c1c;color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:700;z-index:9999';
    errDiv.textContent='⚠ Veri yüklenemedi: '+e.message;
    document.body.appendChild(errDiv);
    setTimeout(()=>errDiv.remove(), 5000);
  }
}

/* ── save() — Koleksiyon için toplu upsert ── */
// Her save() çağrısında yalnızca değişen kaydı push etmek yerine
// tüm koleksiyonu upsert ediyoruz (küçük veri setleri için güvenli)
function save(k){
  const tbl=TBL[k];if(!tbl)return;
  if(k==='policeTurleri'){
    sbUpsertMany(tbl, DB.policeTurleri.map((t,i)=>({id:'tur_'+i,tur:t})));
    return;
  }
  if(k==='cfg'){
    sbUpsert(tbl,{id:'cfg',...DB.cfg});
    LS.setObj('cfg',DB.cfg);
    return;
  }
  sbUpsertMany(tbl, DB[k]||[]);
}

function saveObj(k){ save(k); }

/* ── ÖZEL: Tek kayıt upsert (performans için) ── */
function saveOne(k, obj){
  const tbl=TBL[k];if(!tbl||!obj)return;
  sbUpsert(tbl,obj);
}

/* ── ÖZEL: Tek kayıt sil ── */
function deleteOne(k, id){
  const tbl=TBL[k];if(!tbl||!id)return;
  sbDelete(tbl,id);
}

/* ── TARİH ── */
const AY=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
const AYTR=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const GN=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
function pad(n){return String(n).padStart(2,'0');}
function todayISO(){const n=new Date();return`${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;}
function fmtDot(iso){if(!iso)return'—';const p=iso.split('-');if(p.length<3)return iso;return`${pad(parseInt(p[2]))}.${pad(parseInt(p[1]))}.${p[0]}`;}
function addOneYear(iso){if(!iso)return'';const d=new Date(iso);d.setFullYear(d.getFullYear()+1);return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function kalanGun(iso){if(!iso)return null;const b=new Date(iso);b.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);return Math.round((b-t)/86400000);}
function durumBadge(k){
  if(k===null)return'<span class="badge badge-gray">—</span>';
  if(k<0)return`<span class="badge badge-err">${Math.abs(k)} Gün Geçti</span>`;
  if(k===0)return'<span class="badge badge-err">Bugün Bitiyor</span>';
  if(k<=7)return`<span class="badge badge-err">${k} Gün Kaldı</span>`;
  if(k<=30)return`<span class="badge badge-warn">${k} Gün Kaldı</span>`;
  if(k>3650)return'<span class="badge badge-blue">Başlamadı</span>';
  return`<span class="badge badge-ok">${k} Gün Kaldı</span>`;
}
function durumCls(k){if(k===null)return{t:'—',c:''};if(k<0)return{t:`${Math.abs(k)} Gün Geçti`,c:'geçti'};if(k===0)return{t:'Bugün Bitiyor',c:'uyari'};if(k<=30)return{t:`${k} Gün Kaldı`,c:k<=7?'geçti':'uyari'};if(k>3650)return{t:'Başlamadı',c:'baslamamis'};return{t:`${k} Gün Kaldı`,c:'kalani'};}

/* ══ ANA SAYFA ARAMA ══ */
function dashAra(q){
  const el=document.getElementById('dashAraSonuc');if(!el)return;
  const s=q.trim().toLowerCase();
  if(!s){el.innerHTML='';return;}

  // Müşteri ara
  const mRes=DB.musteriler.filter(m=>m.unvan.toLowerCase().includes(s)||(m.vergi&&m.vergi.includes(s))||(m.tel1&&m.tel1.includes(s))||(m.gsm&&m.gsm.includes(s)));
  // Poliçe ara
  const pRes=DB.policeler.filter(p=>{const m=getM(p.mId);return(p.no&&p.no.toLowerCase().includes(s))||(p.plaka&&p.plaka.toLowerCase().includes(s))||(m&&m.unvan.toLowerCase().includes(s))||(p.tur&&p.tur.toLowerCase().includes(s))||(p.sirket&&p.sirket.toLowerCase().includes(s));});
  // Cari ara
  const cRes=(DB.cariler||[]).filter(c=>c.unvan.toLowerCase().includes(s)||(c.tel&&c.tel.includes(s))||(c.vergi&&c.vergi.includes(s)));

  if(!mRes.length&&!pRes.length&&!cRes.length){
    el.innerHTML=`<div style="padding:12px;text-align:center;color:var(--muted);font-size:12px;font-weight:700">Sonuç bulunamadı — "<em>${q}</em>"</div>`;return;
  }

  let html='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px">';

  if(mRes.length){
    html+=`<div><div style="font-size:10px;font-weight:800;color:var(--acc-dark);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">👥 Müşteriler (${mRes.length})</div>`;

      <div style="font-weight:800;font-size:12px">${m.unvan}</div>
      <div style="font-size:10px;color:var(--muted)">${m.tel1||m.gsm||''} ${m.vergi?'· TC:'+m.vergi:''}</div>
    </div>`).join('');
    if(mRes.length>5)html+=`<div style="font-size:10px;color:var(--muted);padding:3px 5px">... ve ${mRes.length-5} müşteri daha</div>`;

  if(pRes.length){
    html+=`<div><div style="font-size:10px;font-weight:800;color:var(--ok);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">📋 Poliçeler (${pRes.length})</div>`;
    html+=pRes.slice(0,5).map(p=>{const m=getM(p.mId);const k=kalanGun(p.bit);return`<div onclick="polDetay('${p.id}')" style="padding:8px 11px;background:#f0fdf4;border:1.5px solid var(--brd2);border-radius:7px;cursor:pointer;margin-bottom:4px;transition:all .15s" onmouseover="this.style.borderColor='#059669'" onmouseout="this.style.borderColor='var(--brd2)'">

      <div style="font-size:10px;color:var(--muted)">${m?m.unvan:'—'} · ${p.plaka||'Plakasız'} · ${fmtDot(p.bit)}</div>
    </div>`}).join('');
    if(pRes.length>5)html+=`<div style="font-size:10px;color:var(--muted);padding:3px 5px">... ve ${pRes.length-5} poliçe daha</div>`;
    html+='</div>';
  }

  if(cRes.length){
    html+=`<div><div style="font-size:10px;font-weight:800;color:var(--warn);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">💼 Cari (${cRes.length})</div>`;
    html+=cRes.slice(0,5).map(c=>{const bak=cariBakiye(c.id);return`<div onclick="GT('cari',document.getElementById('tbCari'));setTimeout(()=>{window._cariTab='liste';window._cariQ='${c.unvan.replace(/'/g,"\'")}';render();},80)" style="padding:8px 11px;background:#f0fdf4;border:1.5px solid var(--brd2);border-radius:7px;cursor:pointer;margin-bottom:4px;transition:all .15s" onmouseover="this.style.borderColor='var(--warn)'" onmouseout="this.style.borderColor='var(--brd)'">
      <div style="font-weight:800;font-size:12px">${c.unvan}</div>
      <div style="font-size:10px;color:${bak>0?'var(--err)':bak<0?'var(--ok)':'var(--muted)'}">${bak>0?'▲ Borçlu':'▼ Alacaklı'}: ${fmt2(Math.abs(bak))}₺</div>
    </div>`}).join('');
    html+='</div>';
  }

  html+='</div>';
  el.innerHTML=html;
}

window.hBitHesap=function(){
  const b=document.getElementById('hBas')?.value;if(!b)return;
  const s=document.getElementById('hSure')?.value;
  if(s==='custom')return;
  const d=new Date(b);
  if(s==='1y')d.setFullYear(d.getFullYear()+1);
  else if(s==='6m')d.setMonth(d.getMonth()+6);
  else if(s==='3m')d.setMonth(d.getMonth()+3);
  else if(s==='2m')d.setMonth(d.getMonth()+2);
  const el=document.getElementById('hBit');if(el)el.value=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
};

window.hzKomisyonHesap=function(){
  const net=parseFloat(document.getElementById('hNetTutar')?.value||0);
  const oran=parseFloat(document.getElementById('hKomOran')?.value||0);
  const kom=parseFloat((net*oran/100).toFixed(2));
  const el=document.getElementById('hKomTutar');
  if(el)el.value=kom||'';
};
window.hzKomisyonManuel=function(){
  // Manuel değiştirildiğinde oran güncellenir
  const net=parseFloat(document.getElementById('hNetTutar')?.value||0);
  const kom=parseFloat(document.getElementById('hKomTutar')?.value||0);
  if(net>0){
    const oranEl=document.getElementById('hKomOran');
    if(oranEl)oranEl.value=parseFloat((kom/net*100).toFixed(4));
  }
};
window.hzAcenteKomisyonHesap=function(){
  const aceId=document.getElementById('hAce')?.value;
  if(!aceId)return;
  const ace=(DB.acenteler||[]).find(a=>a.id===aceId);
  if(ace&&ace.komOran){
    const el=document.getElementById('hKomOran');
    if(el){el.value=ace.komOran;hzKomisyonHesap();}
  }
};
window.hzMusTC=function(){
  const mId=document.getElementById('hMus')?.value;
  const el=document.getElementById('hTCVergi');
  if(!el)return;
  if(!mId){el.value='';return;}

window.hzOdemeSec=function(tip){

window.hzOdemeInfoGuncelle=function(){
  const brut=parseFloat(document.getElementById('hBrutTutar')?.value||0);
  const durum=document.getElementById('hOdemeDurum')?.value||'odendi';
  const el=document.getElementById('hOdemeInfo');if(!el)return;

  if(durum==='odendi'){
    el.innerHTML=`✅ <strong>Ödendi</strong> — Cariye <span style="color:var(--err)">Borç: ${fmt2(brut)}₺</span> ve <span style="color:var(--ok)">Alacak: ${fmt2(brut)}₺</span> girilir → Hesap sıfırlanır`;
    el.style.background='#dcfce7';el.style.borderColor='#4ade80';el.style.color='#15803d';
  } else {
    el.innerHTML=`⚠️ <strong>Ödenmedi</strong> — Cariye yalnızca <span style="color:var(--err)">Borç: ${fmt2(brut)}₺</span> girer. Alacak tahsilat üzerinden yapılır`;

};

  if(!brutTutar||brutTutar<=0){toast('Brüt tutar giriniz!','err');return;}

  const sureV=document.getElementById('hSure')?.value;
  const sureL=sureV==='1y'?'1 Yıl':sureV==='6m'?'6 Ay':sureV==='3m'?'3 Ay':sureV==='2m'?'2 Ay':'Manuel';
  const netTutar=parseFloat(document.getElementById('hNetTutar')?.value||0);
  const komOran=parseFloat(document.getElementById('hKomOran')?.value||0);
  const komTutar=parseFloat(document.getElementById('hKomTutar')?.value||0);
  const aceId=document.getElementById('hAce')?.value||'';
  const odemeDurum=(document.getElementById('hOdemeDurum')?.value||'odendi')==='odendi'?'odendi':'odenmedi';
  const tahsilSekil=document.getElementById('hTS')?.value||'Nakit';
  const polNo=document.getElementById('hNo')?.value||'';
  const plaka=document.getElementById('hPlaka')?.value||'';
  const polId=uid();

  const pol={id:polId,mId,aceId,
    tcVergi:document.getElementById('hTCVergi')?.value||'',
    tur:document.getElementById('hTur')?.value||'',
    no:polNo,
    sirket:document.getElementById('hSirket')?.value||'',
    tanzim:document.getElementById('hTanzim')?.value||todayISO(),
    bas:document.getElementById('hBas')?.value||'',
    bit:document.getElementById('hBit')?.value||'',
    sure:sureL,
    plaka,
    ruhsat:document.getElementById('hRuhsat')?.value||'',
    aracCins:document.getElementById('hAracCins')?.value||'',
    aracMarka:document.getElementById('hAracMarka')?.value||'',
    aracModel:document.getElementById('hAracModel')?.value||'',
    modelYil:document.getElementById('hModelYil')?.value||'',
    netTutar,brutTutar,komOran,komTutar,
    odemeDurum,tahsilSekil,
    tahsilat:odemeDurum==='odendi'?brutTutar:0,
    kartGiren:document.getElementById('hKartGiren')?.value||'',
    aciklama:document.getElementById('hAck')?.value||'',
    noterAd:document.getElementById('itNoterAd')?.value||'',
    noterNo:document.getElementById('itNoterNo')?.value||'',
    ekTarih:todayISO()};
  DB.policeler.push(pol);saveOne('policeler',pol);

  const mus=getM(mId);
  const polAciklama=`${pol.tur||''} | Poliçe No: ${polNo||'—'} | ${plaka||''} | ${fmtDot(pol.bas)}–${fmtDot(pol.bit)}`.replace(/\s*\|\s*\|/g,'|').trim();

  /* ── CARİ: Müşteri — otomatik bul veya oluştur ── */
  let cari=(DB.cariler||[]).find(x=>x.mId===mId)||
           (mus?(DB.cariler||[]).find(x=>x.unvan.trim().toLowerCase()===mus.unvan.trim().toLowerCase()):null);
  if(!cari && mus){
    cari={id:uid(),mId,unvan:mus.unvan,tur:'Müşteri',yetkili:'',
      tel:mus.tel1||mus.gsm||'',email:mus.email||'',vergi:mus.vergi||'',
      sehir:mus.sehir||'',adres:mus.adres||'',not:'',ekTarih:todayISO()};
    DB.cariler.push(cari);saveOne('cariler',cari);
    toast(`"${mus.unvan}" için cari otomatik oluşturuldu`,'info');
  } else if(cari && !cari.mId){
    // Varolan cari'ye mId bağla
    cari.mId=mId;save('cariler');
  }

  if(cari){
    const tanzimTarih=pol.tanzim||todayISO();
    // Brüt tutarı HER ZAMAN BORÇ olarak gir
    DB.cariHareketler.push({id:uid(),cId:cari.id,mId,tip:'borc',
      tarih:tanzimTarih,
      tutar:brutTutar,
      policeNo:polNo,
      plaka,
      aciklama:`Poliçe Borç — ${polAciklama}`});
    // "Ödendi" ise aynı tutarda ALACAK da gir → bakiye sıfırlanır
    if(odemeDurum==='odendi'){
      DB.cariHareketler.push({id:uid(),cId:cari.id,mId,tip:'alacak',
        tarih:tanzimTarih,
        tutar:brutTutar,
        policeNo:polNo,
        plaka,
        aciklama:`Poliçe Tahsilat (${tahsilSekil}) — ${polAciklama}`});
    }
    save('cariHareketler');
  }

  /* ── ACENTE: Komisyon Borcu ── */
  if(aceId && komTutar>0){
    DB.acenteTahsilatlar.push({id:uid(),aceId,tarih:todayISO(),
      tutar:komTutar,yontem:'Komisyon',
      aciklama:'Poliçe Komisyon — '+polAciklama,polId,tip:'borc'});
    save('acenteTahsilatlar');
  }

  const msgs=[`✓ Poliçe kaydedildi`];
  if(cari) msgs.push(odemeDurum==='odendi'?'Cari: Borç+Alacak girildi (bakiye sıfır)':'Cari: Borç girildi ('+fmt2(brutTutar)+'₺)');
  if(aceId&&komTutar>0) msgs.push(`Acente kom. ${fmt2(komTutar)}₺`);
  toast(msgs.join(' · '));
  window._polTab='liste';
  TAB='policeler';
  document.querySelectorAll('.tb-btn').forEach(b=>b.classList.remove('active'));
  const tbPol=document.getElementById('tbPoliceler');if(tbPol)tbPol.classList.add('active');
  render();
}

/* ── POLİÇE LİSTESİ (iç) ── */
function rPolicelerInner(c){
  const q=(window._pQ||'').toLowerCase();
  const tur=window._pTur||'';
  const srt=window._pSrt||'bit';
  let list=[...DB.policeler];
  if(q)list=list.filter(p=>{const m=getM(p.mId);return(p.no&&p.no.toLowerCase().includes(q))||(p.plaka&&p.plaka.toLowerCase().includes(q))||(m&&m.unvan.toLowerCase().includes(q))||(p.tur&&p.tur.toLowerCase().includes(q));});
  if(tur)list=list.filter(p=>p.tur===tur);
  if(srt==='bit')list.sort((a,b)=>a.bit.localeCompare(b.bit));else list.sort((a,b)=>(b.ekTarih||'').localeCompare(a.ekTarih||''));
  c.innerHTML=`
    <div class="card" style="margin-bottom:10px;padding:10px">
      <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">
        <input placeholder="🔍  Müşteri, Poliçe No, Plaka, Tür..." value="${window._pQ||''}" oninput="window._pQ=this.value;_dRender()" style="flex:1;min-width:180px">

          const m=getM(p.mId);
          const k=kalanGun(p.bit);
          const iptal=!!p.iptalEdildi;

          let durumCol='';

            durumCol=`<span class="badge badge-err">🚫 İPTAL</span><br><span style="font-size:9.5px;color:var(--err);font-weight:700">${fmtDot(p.iptalTarih||'')}</span>`;
          } else if(k!==null&&k<0){
            durumCol=`<span class="badge badge-err">⚠ ${Math.abs(k)} Gün Geçti</span>`;
          } else if(k===0){
            durumCol=`<span class="badge badge-err">⚡ Bugün Bitiyor</span>`;
          } else if(k!==null&&k<=7){
            durumCol=`<span class="badge badge-err">🔴 ${k} Gün Kaldı</span>`;
          } else if(k!==null&&k<=30){
            durumCol=`<span class="badge badge-warn">🟡 ${k} Gün Kaldı</span>`;

        <select style="width:auto" onchange="window._sqS=this.value;render()">

    </div>
    <div class="card">
      <div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:8px">Sonuç: ${list.length} / ${DB.policeler.length} kayıt</div>
      <div class="twrap"><table>
        <thead><tr><th>Baş. Tarihi</th><th>Bitiş Tarihi</th><th>Süre</th><th>Poliçe Türü</th><th>Poliçe No</th><th>Plaka</th><th>Müşteri</th><th>Durum</th><th>İşlem</th></tr></thead>
        <tbody>${list.length?list.map(p=>{const m=getM(p.mId);const k=kalanGun(p.bit);return`<tr>
          <td>${fmtDot(p.bas)}</td><td>${fmtDot(p.bit)}</td><td>${p.sure||'1 Yıl'}</td><td>${p.tur||'—'}</td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:10.5px">${p.no||'—'}</td>

/* ══ POLİÇE SORGULA ══ */
function rSorgula(c){
  const mode=window._sqM||'genel';
  const tur=window._sqT||'';
  const q=(window._sqQ||'').toLowerCase();
  const srt=window._sqS||'bit';
  let list=[...DB.policeler];
  if(mode==='biten')list=list.filter(p=>{const k=kalanGun(p.bit);return k!==null&&k<0;});
  else if(mode==='yaklasan')list=list.filter(p=>{const k=kalanGun(p.bit);return k!==null&&k>=0&&k<=30;});
  else if(mode==='aktif')list=list.filter(p=>{const k=kalanGun(p.bit);return k!==null&&k>0;});
  if(tur)list=list.filter(p=>p.tur===tur);
  if(q)list=list.filter(p=>{const m=getM(p.mId);return(p.no&&p.no.toLowerCase().includes(q))||(p.plaka&&p.plaka.toLowerCase().includes(q))||(m&&m.unvan.toLowerCase().includes(q))||(p.tur&&p.tur.toLowerCase().includes(q));});
  if(srt==='bit')list.sort((a,b)=>a.bit.localeCompare(b.bit));
  else if(srt==='bas')list.sort((a,b)=>a.bas.localeCompare(b.bas));
  else list.sort((a,b)=>{const ma=getM(a.mId),mb=getM(b.mId);return(ma?ma.unvan:'').localeCompare(mb?mb.unvan:'','tr');});

  const modes=[['genel','Genel Sorgu'],['aktif','Aktif Poliçeler'],['yaklasan','30 Gün İçinde'],['biten','Süresi Biten']];
  c.innerHTML=`<div style="padding:14px">
    <div class="card" style="margin-bottom:10px">
      <div class="card-title"><span>🔍</span> Poliçe Sorgula</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">
        ${modes.map(([m,l])=>`<button onclick="window._sqM='${m}';render()" style="padding:6px 12px;border:1.5px solid var(--brd2);border-radius:6px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;cursor:pointer;background:${mode===m?'var(--acc)':'var(--surf)'};color:${mode===m?'#fff':'var(--muted)'}">${l}</button>`).join('')}
        <select style="width:auto" onchange="window._sqT=this.value;render()"><option value="">Tüm Poliçeler</option>${DB.policeTurleri.map(t=>`<option ${tur===t?'selected':''}>${t}</option>`).join('')}</select>
        <select style="width:auto" onchange="window._sqS=this.value;render()">
          <option value="bit">Bitiş Tarihine</option><option value="bas">Başlangıç Tarihine</option><option value="mus">Müşteriye</option>
        </select>
      </div>
      <input placeholder="🔍  Müşteri, Poliçe No, Plaka, Tür..." value="${window._sqQ||''}" oninput="window._sqQ=this.value;_dRender()">
    </div>
    <div class="card">
      <div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:8px">Sonuç: ${list.length} / ${DB.policeler.length} kayıt</div>
      <div class="twrap"><table>
        <thead><tr><th>Baş. Tarihi</th><th>Bitiş Tarihi</th><th>Süre</th><th>Poliçe Türü</th><th>Poliçe No</th><th>Plaka</th><th>Müşteri</th><th>Durum</th><th>İşlem</th></tr></thead>
        <tbody>${list.length?list.map(p=>{const m=getM(p.mId);const k=kalanGun(p.bit);return`<tr>
          <td>${fmtDot(p.bas)}</td><td>${fmtDot(p.bit)}</td><td>${p.sure||'1 Yıl'}</td><td>${p.tur||'—'}</td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:10.5px">${p.no||'—'}</td>
          <td>${p.plaka||'—'}</td><td>${m?m.unvan:'—'}</td><td>${durumBadge(k)}</td>
          <td class="tdact">
            <button class="btn btn-primary btn-xs" onclick="polDetay('${p.id}')">Poliçe Bilg.</button>
            <button class="btn btn-success btn-xs" onclick="hesabaGit('${p.mId}')">Müşteri Bilg.</button>
          </td></tr>`;}).join(''):`<tr><td colspan="9"><div class="empty"><div class="ei">🔍</div><p>Kayıt bulunamadı</p></div></td></tr>`}
        </tbody>
      </table></div>
    </div></div>`;
}

function mYeniKayit(){
  openModal('Yeni Müşteri Kaydı', mFormHTML({},'nm'),()=>{

    DB.musteriler.push({id:uid(),tel2:'', ...d});saveOne('musteriler',DB.musteriler[DB.musteriler.length-1]);
    save('musteriler');render();closeModal();toast('Müşteri kaydedildi ✓');
  },true);
}

function mDuzenle(id){
  const m=getM(id);if(!m)return;
  openModal('Müşteri Düzenle', mFormHTML(m,'em'),()=>{
    const d=mFormOku('em');
    if(!d.unvan){toast('Ad Soyad zorunlu!','err');return;}

function mSil(id){

/* ══ ACENTELER ══ */
const getA=id=>(DB.acenteler||[]).find(a=>a.id===id);
function aceSayisi(aceId){return DB.policeler.filter(p=>p.aceId===aceId).length;}
function aceToplam(aceId){return DB.policeler.filter(p=>p.aceId===aceId).reduce((s,p)=>s+parseFloat(p.brutTutar||p.tahsilat||0),0);}
function aceKomToplam(aceId){return DB.policeler.filter(p=>p.aceId===aceId).reduce((s,p)=>s+parseFloat(p.komTutar||0),0);}
// Sadece pozitif tahsilatlar (gerçek ödemeler)
function aceTahsilatToplam(aceId){return (DB.acenteTahsilatlar||[]).filter(t=>t.aceId===aceId&&parseFloat(t.tutar||0)>0).reduce((s,t)=>s+parseFloat(t.tutar||0),0);}
// Negatif tutarlar = iptal komisyon iadesi (acentenin bize borçlu olduğu tutar)
function aceIadeBorcu(aceId){return Math.abs((DB.acenteTahsilatlar||[]).filter(t=>t.aceId===aceId&&parseFloat(t.tutar||0)<0).reduce((s,t)=>s+parseFloat(t.tutar||0),0));}
// Kalan = Komisyon - Ödenen Tahsilat + İade Borcu
function aceKalan(aceId){return aceKomToplam(aceId)-aceTahsilatToplam(aceId)+aceIadeBorcu(aceId);}

function rAcenteler(c){
  const at=window._aceTab||'liste';

  const toplamKom=DB.acenteler.reduce((s,a)=>s+aceKomToplam(a.id),0);
  const toplamTah=DB.acenteler.reduce((s,a)=>s+aceTahsilatToplam(a.id),0);
  const toplamIadeBorcu=DB.acenteler.reduce((s,a)=>s+aceIadeBorcu(a.id),0);
  const toplamBakiye=toplamKom-toplamTah+toplamIadeBorcu;

  c.innerHTML=`<div style="padding:14px">

  </div>

  <!-- SEKMELER -->
  <div class="tabs">
    <button class="tab ${at==='liste'?'on':''}" onclick="window._aceTab='liste';render()">🏢 Acente Listesi</button>

  openDrawer(`🏢 ${a.unvan}`,`
    <div class="dsec"><h4>Acente Bilgileri</h4>
      <div class="drow"><span class="dk">Unvan</span><span class="dv">${a.unvan}</span></div>

      <div class="drow"><span class="dk">Toplam Komisyon</span><span class="dv" style="color:var(--ok)">${fmt2(kom)}₺</span></div>
      <div class="drow"><span class="dk">Ödenen</span><span class="dv" style="color:var(--warn)">${fmt2(tah)}₺</span></div>
      <div class="drow"><span class="dk">Kalan Bakiye</span><span class="dv" style="color:${kal>0?'var(--err)':'var(--ok)'};font-weight:900">${fmt2(kal)}₺</span></div>

            <div class="pol-meta">${fmtDot(p.bas)} → ${fmtDot(p.bit)} · ${p.plaka||'Plakasız'}</div>
          </div>
          <div class="pol-dur ${d.c}">${d.t}</div>
        </div>`;}).join('')}
    </div>`:''}

/* ══ CARİ ══ */
const getCari=id=>(DB.cariler||[]).find(c=>c.id===id);

function cariBorc(cId){
  return (DB.cariHareketler||[]).filter(h=>h.cId===cId&&(h.tip==='borc'||h.tip==='iade'||h.tip==='iadeodeme')).reduce((s,h)=>s+parseFloat(h.tutar||0),0);
}
function cariAlacak(cId){
  return (DB.cariHareketler||[]).filter(h=>h.cId===cId&&(h.tip==='alacak')).reduce((s,h)=>s+parseFloat(h.tutar||0),0);
}
function cariBakiye(cId){return cariBorc(cId)-cariAlacak(cId);}

function rCari(c){
  const at=window._cariTab||'liste';
  if(!DB.cariler)DB.cariler=[];
  if(!DB.cariHareketler)DB.cariHareketler=[];

  const toplamCari=DB.cariler.length;
  const toplamBorc=DB.cariler.reduce((s,x)=>s+cariBorc(x.id),0);
  const toplamAlacak=DB.cariler.reduce((s,x)=>s+cariAlacak(x.id),0);
  const netBakiye=toplamBorc-toplamAlacak;
  const borclu=DB.cariler.filter(x=>cariBakiye(x.id)>0).length;
  const alacakli=DB.cariler.filter(x=>cariBakiye(x.id)<0).length;

  c.innerHTML=`<div style="padding:14px">
  <div class="stat-grid" style="grid-template-columns:repeat(auto-fill,minmax(150px,1fr));margin-bottom:12px">
    <div class="stat-box"><div class="sv">${toplamCari}</div><div class="sl">Toplam Cari</div></div>
    <div class="stat-box danger"><div class="sv">${borclu}</div><div class="sl">Borçlu</div></div>
    <div class="stat-box ok"><div class="sv">${alacakli}</div><div class="sl">Alacaklı</div></div>
    <div class="stat-box danger"><div class="sv">${fmt2(toplamBorc)}₺</div><div class="sl">Toplam Borç</div></div>
    <div class="stat-box ok"><div class="sv">${fmt2(toplamAlacak)}₺</div><div class="sl">Toplam Alacak</div></div>
    <div class="stat-box ${netBakiye>0?'danger':'ok'}"><div class="sv">${fmt2(Math.abs(netBakiye))}₺</div><div class="sl">Net Bakiye</div></div>
  </div>
  <div class="tabs">
    <button class="tab ${at==='liste'?'on':''}" onclick="window._cariTab='liste';render()">📋 Cari Listesi</button>
    <button class="tab ${at==='ekle'?'on':''}" onclick="window._cariTab='ekle';render()">➕ Cari Ekle</button>
    <button class="tab ${at==='tahsilat'?'on':''}" onclick="window._cariTab='tahsilat';render()">💳 Cari Tahsilat</button>
    <button class="tab ${at==='hareket'?'on':''}" onclick="window._cariTab='hareket';render()">📑 Hareket Ekstresi</button>
  </div>
  ${at==='liste'?cariListeHTML():''}
  ${at==='ekle'?cariEkleHTML():''}
  ${at==='tahsilat'?cariTahsilatHTML():''}
  ${at==='hareket'?cariHareketHTML():''}
  </div>`;
}

/* ── CARİ LİSTE ── */
function cariListeHTML(){
  const q=(window._cariQ||'').toLowerCase();
  const filtre=window._cariFil||'hepsi';
  let list=[...(DB.cariler||[])];
  if(q)list=list.filter(x=>x.unvan.toLowerCase().includes(q)||(x.tel&&x.tel.includes(q))||(x.vergi&&x.vergi.includes(q)));
  if(filtre==='borclu')list=list.filter(x=>cariBakiye(x.id)>0);
  else if(filtre==='alacakli')list=list.filter(x=>cariBakiye(x.id)<0);
  else if(filtre==='sifir')list=list.filter(x=>cariBakiye(x.id)===0);
  list.sort((a,b)=>a.unvan.localeCompare(b.unvan,'tr'));

  if(!window._cariAcik)window._cariAcik=new Set();

  return`<div class="card">

window.cariToggleExpand=function(id){
  if(!window._cariAcik)window._cariAcik=new Set();
  if(window._cariAcik.has(id))window._cariAcik.delete(id);
  else window._cariAcik.add(id);
  render();
};

                DB.musteriler.find(m=>{

              <td style="padding:6px 8px;font-family:'JetBrains Mono',monospace;color:var(--ok);font-weight:800">${fmt2(p.tahsilat||0)}₺</td>
              <td style="padding:6px 8px">${durumBadge(k)}</td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>`
        :`<div style="text-align:center;padding:14px;color:var(--muted);font-size:12px">📋 Bu müşteriye ait poliçe bulunamadı</div>`}
      </div>
    </div>

    <!-- CARİ HAREKETLERİ -->

        <span>💳 Cari Hareketleri</span>

      </div>
      <div style="padding:10px">
        ${hareketler.length?`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px;min-width:500px">

function cariKaydet(){
  if(!DB.cariler)DB.cariler=[];
  const u=document.getElementById('ceUnvan')?.value.trim();
  if(!u){toast('Cari unvanı zorunlu!','err');return;}
  const x={id:uid(),unvan:u,tur:document.getElementById('ceTur')?.value||'Müşteri',
    yetkili:document.getElementById('ceYetkili')?.value||'',tel:document.getElementById('ceTel')?.value||'',
    email:document.getElementById('ceEmail')?.value||'',vergi:document.getElementById('ceVergi')?.value||'',
    sehir:document.getElementById('ceSehir')?.value||'',adres:document.getElementById('ceAdres')?.value||'',
    not:document.getElementById('ceNot')?.value||'',ekTarih:todayISO()};
  DB.cariler.push(x);saveOne('cariler',x);
  toast('Cari kaydedildi ✓');window._cariTab='liste';render();
}

window.cariTipSec=function(tip){
  document.getElementById('ctTip').value=tip;
  const bBtn=document.getElementById('ctBorcBtn');
  const aBtn=document.getElementById('ctAlacakBtn');
  if(tip==='borc'){
    bBtn.className='btn btn-danger';aBtn.className='btn btn-ghost';
  } else {
    bBtn.className='btn btn-ghost';aBtn.className='btn btn-success';
  }
};

window.cariTipSec2=function(tip){
  document.getElementById('ctTip').value=tip;
  const ids=['ctBorcBtn','ctAlacakBtn','ctIadeBtn','ctIadeOdBtn'];
  const vals=['borc','alacak','iade','iadeodeme'];
  const clss=['btn btn-danger','btn btn-success','btn btn-warn','btn btn-primary'];
  const lbls=['▲ BORÇ','▼ ALACAK','↩ İADE','✅ İADE ÖDEMESİ'];
  const etiketStyle=['background:#fee2e2;color:#b91c1c','background:#dcfce7;color:#15803d','background:#fef3c7;color:#92400e','background:#dcfce7;color:#1d4ed8'];
  ids.forEach((id,i)=>{
    const el=document.getElementById(id);if(!el)return;
    el.className=vals[i]===tip?clss[i]:'btn btn-ghost';
    el.style.justifyContent='center';
  });
  const et=document.getElementById('ctTipEtiket');
  if(et){const i=vals.indexOf(tip);et.style.cssText=`margin-top:6px;padding:5px 9px;border-radius:5px;font-size:11px;font-weight:700;text-align:center;${etiketStyle[i]||etiketStyle[0]}`;et.textContent=lbls[i]||lbls[0]+' seçili';}

  // İADE ÖDEMESİ seçilince: mevcut bakiyeyi otomatik tuta yaz + bilgi kutusu göster
  const bilgiEl=document.getElementById('ctIadeOdBilgi');
  if(tip==='iadeodeme'){
    const cId=document.getElementById('ctCari')?.value||window._ctCariSel||'';
    if(cId){
      const bakiye=cariBakiye(cId);
      // Bakiye negatif = müşteri alacaklı = iade ödemesi yapılacak
      if(bakiye<0){
        const odenecek=Math.abs(bakiye);
        const tutarEl=document.getElementById('ctTutar');
        if(tutarEl)tutarEl.value=odenecek.toFixed(2);
        if(bilgiEl){
          bilgiEl.style.display='block';
                    bilgiEl.innerHTML='✅ <strong>İade Ödemesi</strong> — Müşteri alacağı: <strong>'+fmt2(odenecek)+'&#8378;</strong> — Tutar dolduruldu, kaydedince hesap sıfırlanır.';
        }
      } else if(bakiye===0){
        if(bilgiEl){bilgiEl.style.display='block';bilgiEl.innerHTML='ℹ️ Bu carinin bakiyesi zaten <strong>0₺</strong> — ödenecek alacak yok.';}
      } else {
        if(bilgiEl){bilgiEl.style.display='block';bilgiEl.innerHTML='⚠️ Bu carinin <strong>'+fmt2(bakiye)+'₺</strong> borcu var, alacağı yok.';}
      }
    } else {
      if(bilgiEl){bilgiEl.style.display='block';bilgiEl.innerHTML='⚠️ Önce cari seçin, bakiye otomatik doldurulsun.';}
    }
  } else {
    if(bilgiEl)bilgiEl.style.display='none';
  }
};

window.ctMusteriSec=function(mId){
  if(!mId){window._ctCariSel='';ctPolSecTemizle();return;}
  const m=getM(mId);if(!m)return;
  // Cari listesinde aynı isimli varsa seç
  const cariler=DB.cariler||[];
  const eslesen=cariler.find(c=>c.unvan.toLowerCase()===m.unvan.toLowerCase());
  if(eslesen){
    window._ctCariSel=eslesen.id;
    const sel=document.getElementById('ctCari');if(sel)sel.value=eslesen.id;
  }
  // Poliçe dropdown'ını güncelle
  const polSec=document.getElementById('ctPolSec');
  if(polSec){
    const pols=DB.policeler.filter(p=>p.mId===mId).sort((a,b)=>(b.bit||'').localeCompare(a.bit||''));
    polSec.innerHTML='<option value="">— Poliçe Seçiniz (otomatik) —</option>'+
      pols.map(p=>`<option value="${p.id}">${p.no||'(No yok)'} — ${p.tur||''} — ${p.plaka||'Plakasız'} — ${fmtDot(p.bit)}</option>`).join('');
  }
  ctPolSecTemizle();
};

function ctPolSecTemizle(){
  const no=document.getElementById('ctPoliceNo');if(no)no.value='';
  const pl=document.getElementById('ctPlaka');if(pl)pl.value='';
}

window.ctPolSec=function(polId){
  const no=document.getElementById('ctPoliceNo');
  const pl=document.getElementById('ctPlaka');
  if(!polId){if(no)no.value='';if(pl)pl.value='';return;}
  const p=getP(polId);if(!p)return;
  if(no)no.value=p.no||'';
  if(pl)pl.value=p.plaka||'';
};

window.ctFormTemizle=function(){
  const ids=['ctMusteri','ctCari','ctPoliceNo','ctPlaka','ctTutar','ctAciklama'];
  ids.forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const td=document.getElementById('ctTarih');if(td)td.value=todayISO();
  const ps=document.getElementById('ctPolSec');if(ps)ps.value='';
  cariTipSec2('borc');
  toast('Form temizlendi','info');
};

function cariHareketKaydet(){
  if(!DB.cariHareketler)DB.cariHareketler=[];
  const cId=document.getElementById('ctCari')?.value||window._ctCariSel||'';
  if(!cId){toast('Cari seçiniz!','err');return;}
  const tutar=parseFloat(document.getElementById('ctTutar')?.value||0);
  if(!tutar||tutar<=0){toast('Geçerli bir tutar girin!','err');return;}
  const tip=document.getElementById('ctTip')?.value||'borc';
  const tipLbl={borc:'Borç',alacak:'Alacak',iade:'İade',iadeodeme:'İade Ödemesi'};
  const mId=document.getElementById('ctMusteri')?.value||'';
  const h={id:uid(),cId,mId,tip,
    tarih:document.getElementById('ctTarih')?.value||todayISO(),
    tutar,
    policeNo:document.getElementById('ctPoliceNo')?.value||'',
    plaka:document.getElementById('ctPlaka')?.value||'',
    aciklama:document.getElementById('ctAciklama')?.value||''};
  DB.cariHareketler.push(h);saveOne('cariHareketler',h);
  toast(`${tipLbl[tip]||tip} hareketi kaydedildi ✓`);
  ctFormTemizle();
  window._ctMusSel='';window._ctCariSel='';
  render();
}

function cariHareketSil(id){
  openModal('Hareket Sil',`<div class="alert alert-err"><span>⚠️</span><span>Bu hareket kaydı silinecek. Emin misiniz?</span></div>`,()=>{
    DB.cariHareketler=DB.cariHareketler.filter(x=>x.id!==id);
    save('cariHareketler');render();closeModal();toast('Hareket silindi','warn');
  });
}

  const b=cariBorc(id),a=cariAlacak(id),bak=b-a;
  const hareketler=[...(DB.cariHareketler||[])].filter(h=>h.cId===id).sort((a,b)=>b.tarih.localeCompare(a.tarih));

      ${x.sehir?`<div class="drow"><span class="dk">Şehir</span><span class="dv">${x.sehir}</span></div>`:''}

/* ── CARİ DÜZENLE ── */
function cariDuzenle(id){
  const x=getCari(id);if(!x)return;
  openModal('Cari Düzenle',`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div><label class="lbl">Cari Unvanı *</label><input id="edCeU" value="${x.unvan}"></div>
      <div><label class="lbl">Cari Türü</label>
        <select id="edCeT">${['Müşteri','Tedarikçi','Personel','Diğer'].map(t=>`<option ${x.tur===t?'selected':''}>${t}</option>`).join('')}</select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div><label class="lbl">Yetkili</label><input id="edCeY" value="${x.yetkili||''}"></div>
      <div><label class="lbl">Telefon</label><input id="edCeTel" value="${x.tel||''}"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">
      <div><label class="lbl">E-Posta</label><input id="edCeE" value="${x.email||''}"></div>
      <div><label class="lbl">Vergi No / TC</label><input id="edCeV" value="${x.vergi||''}"></div>
      <div><label class="lbl">Şehir</label><input id="edCeS" value="${x.sehir||''}"></div>
    </div>
    <div><label class="lbl">Adres</label><textarea id="edCeA">${x.adres||''}</textarea></div>
  `,()=>{
    const u=document.getElementById('edCeU').value.trim();
    if(!u){toast('Unvan zorunlu!','err');return;}
    x.unvan=u;x.tur=document.getElementById('edCeT').value;x.yetkili=document.getElementById('edCeY').value;
    x.tel=document.getElementById('edCeTel').value;x.email=document.getElementById('edCeE').value;
    x.vergi=document.getElementById('edCeV').value;x.sehir=document.getElementById('edCeS').value;
    x.adres=document.getElementById('edCeA').value;
    save('cariler');render();closeModal();toast('Cari güncellendi');
  },true);
}

/* ── CARİ SİL ── */
function cariSil(id){
  const x=getCari(id);const hc=(DB.cariHareketler||[]).filter(h=>h.cId===id).length;
  openModal('⚠️ Cari Sil',`
    <div class="alert alert-err"><span>⚠️</span><div>DİKKAT! <strong>${x?x.unvan:''}</strong> silinecek.<br>${hc>0?`Bu cariye ait <strong>${hc} hareket</strong> kaydı da silinecek!<br>`:''}Emin misiniz?</div></div>
  `,()=>{
    DB.cariler=DB.cariler.filter(y=>y.id!==id);
    DB.cariHareketler=(DB.cariHareketler||[]).filter(h=>h.cId!==id);
    save('cariler');save('cariHareketler');
    render();closeModal();toast('Cari silindi','warn');
  });
}

/* ══ UYARILAR ══ */
function rUyarilar(c){
  const ug=parseInt(DB.cfg.uyariGun)||30;
  const bitenler=DB.policeler.filter(p=>{const k=kalanGun(p.bit);return k!==null&&k>=0&&k<=ug;}).sort((a,b)=>a.bit.localeCompare(b.bit));
  let sel=window._uySel||null;
  const selP=sel?getP(sel):null;
  const selM=selP?getM(selP.mId):null;

  c.innerHTML=`<div style="padding:14px"><div style="display:grid;grid-template-columns:1fr${selP?' 360px':''};gap:12px;align-items:start">
    <div class="card">
      <div class="card-title"><span>🔔</span> 1 Ay İçerisinde Bitecek Poliçeler <span class="badge badge-warn" style="margin-left:auto">${bitenler.length}</span></div>
      ${bitenler.length?`<div class="twrap"><table>
        <thead><tr><th>Bitiş Tarihi</th><th>Süre</th><th>Poliçe No</th><th>Plaka</th><th>Müşteri</th><th>Durum</th></tr></thead>
        <tbody>${bitenler.map(p=>{const k=kalanGun(p.bit);const m=getM(p.mId);return`<tr style="cursor:pointer${sel===p.id?';background:#dcfce7':''}" onclick="window._uySel='${p.id}';render()">
          <td><strong>${fmtDot(p.bit)}</strong></td><td>${p.sure||'1 Yıl'}</td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:10.5px">${p.no||'—'}</td>
          <td>${p.plaka||'—'}</td><td>${m?m.unvan:'—'}</td>
          <td>${durumBadge(k)}</td></tr>`;}).join('')}</tbody>
      </table></div>
      <div class="bgrp" style="margin-top:10px">
        <button class="btn btn-primary btn-sm" onclick="uyMusteriBilgi()">👤 Müşteri Bilgileri</button>
        <button class="btn btn-success btn-sm" onclick="uyHesaba()">Kişinin Hesabına Git →</button>
      </div>`:`<div class="empty"><div class="ei">✅</div><p>Uyarı verecek poliçe yok</p></div>`}
    </div>
    ${selP&&selM?`<div class="card">
      <div class="card-title"><span>👤</span> Müşteri Bilgileri</div>
      <div class="drow"><span class="dk">Ünvanı</span><span class="dv">${selM.unvan}</span></div>
      ${selM.yetkili?`<div class="drow"><span class="dk">Yetkili</span><span class="dv">${selM.yetkili}</span></div>`:''}
      ${selM.vergi?`<div class="drow"><span class="dk">TC Kimlik No</span><span class="dv">${selM.vergi}</span></div>`:''}
      ${selM.dogumTarih?`<div class="drow"><span class="dk">Doğum Tarihi</span><span class="dv">${fmtDot(selM.dogumTarih)}</span></div>`:''}
      ${selM.sehir?`<div class="drow"><span class="dk">Şehir</span><span class="dv">${selM.sehir}</span></div>`:''}
      ${selM.tel1?`<div class="drow"><span class="dk">Tel 1</span><span class="dv">${selM.tel1}</span></div>`:''}
      ${selM.gsm?`<div class="drow"><span class="dk">GSM</span><span class="dv">${selM.gsm}</span></div>`:''}
      ${selM.adres?`<div class="drow" style="align-items:start"><span class="dk">Adres</span><span class="dv" style="max-width:180px;text-align:right;font-size:11px">${selM.adres}</span></div>`:''}
      <div class="bgrp" style="margin-top:10px"><button class="btn btn-success" onclick="hesabaGit('${selP.mId}')">Hesabı Aç →</button></div>
    </div>`:''}

}
function uyMusteriBilgi(){
  if(!window._uySel){toast('Önce bir poliçe seçin','warn');return;}
  const p=getP(window._uySel);if(!p)return;
  const m=getM(p.mId);if(!m)return;
  openDrawer(`👤 ${m.unvan}`,`
    <div class="dsec"><h4>Müşteri Bilgileri</h4>
      <div class="drow"><span class="dk">Ünvanı</span><span class="dv">${m.unvan}</span></div>
      ${m.yetkili?`<div class="drow"><span class="dk">Yetkili</span><span class="dv">${m.yetkili}</span></div>`:''}
      ${m.vergi?`<div class="drow"><span class="dk">TC Kimlik No</span><span class="dv" style="font-family:'JetBrains Mono',monospace">${m.vergi}</span></div>`:''}
      ${m.dogumTarih?`<div class="drow"><span class="dk">Doğum Tarihi</span><span class="dv">${fmtDot(m.dogumTarih)}</span></div>`:''}
      ${m.sehir?`<div class="drow"><span class="dk">Şehir</span><span class="dv">${m.sehir}</span></div>`:''}
      ${m.tel1?`<div class="drow"><span class="dk">Tel 1</span><span class="dv">${m.tel1}</span></div>`:''}
      ${m.gsm?`<div class="drow"><span class="dk">GSM</span><span class="dv">${m.gsm}</span></div>`:''}
      ${m.aciklama?`<div class="drow" style="align-items:start"><span class="dk">Açıklama</span><span class="dv" style="max-width:220px;text-align:right;font-size:11px">${m.aciklama}</span></div>`:''}
    </div>`);
}
function uyHesaba(){
  if(!window._uySel){toast('Önce bir poliçe seçin','warn');return;}
  const p=getP(window._uySel);if(!p)return;
  hesabaGit(p.mId);
}

function loginModGoster(mod){
  document.getElementById('loginFormTek').style.display = mod==='tek' ? 'block' : 'none';
  document.getElementById('loginFormKul').style.display = mod==='kullanici' ? 'block' : 'none';
  const btnTek = document.getElementById('loginTabTek');
  const btnKul = document.getElementById('loginTabKul');
  if(btnTek){ btnTek.style.background=mod==='tek'?'#059669':'transparent'; btnTek.style.color=mod==='tek'?'#fff':'#6b7280'; }
  if(btnKul){ btnKul.style.background=mod==='kullanici'?'#059669':'transparent'; btnKul.style.color=mod==='kullanici'?'#fff':'#6b7280'; }
}

function loginGosterHata(msg){
  const el=document.getElementById('lgErr');
  if(el){ el.style.display='block'; el.textContent='✗ '+(msg||'Şifre hatalı!'); }
}

function loginTekSifre(){
  const sifre = document.getElementById('lgTekSifre')?.value||'';
  const dogruSifre = DB.cfg.loginSifre||DB.cfg.sifre||'1234';
  if(sifre === dogruSifre){
    OTURUM = {ad:'Yönetici', rol:'admin'};
    girisBas();
  } else {
    loginGosterHata('Şifre hatalı!');
    document.getElementById('lgTekSifre').style.borderColor='#dc2626';
    setTimeout(()=>{ const el=document.getElementById('lgTekSifre'); if(el) el.style.borderColor='#bbf7d0'; },1500);
  }
}

function loginKullanici(){
  const ad    = (document.getElementById('lgKulAd')?.value||'').trim().toLowerCase();
  const sifre = document.getElementById('lgKulSifre')?.value||'';
  if(!ad||!sifre){ loginGosterHata('Kullanıcı adı ve şifre zorunlu!'); return; }
  const kul = (DB.kullanicilar||[]).find(k=>k.kulAd.toLowerCase()===ad && k.sifre===sifre && k.aktif!==false);
  if(kul){
    OTURUM = {ad:kul.adSoyad||kul.kulAd, rol:kul.rol||'kullanici', id:kul.id};
    girisBas();
  } else {
    loginGosterHata('Kullanıcı adı veya şifre hatalı!');
  }
}

function girisBas(){
  // Toolbar'ı göster
  const toolbar=document.getElementById('toolbar');
  if(toolbar) toolbar.style.display='';

  document.querySelectorAll('.tb-btn').forEach(b=>b.classList.remove('active'));

  render();

function kullaniciEkle(){

function vYedekAl(){
  const yedek={
    _versiyon:'supabase-v1',_tarih:new Date().toISOString(),
    musteriler:DB.musteriler||[],
    policeler:DB.policeler||[],
    policeTurleri:DB.policeTurleri||[],
    acenteler:DB.acenteler||[],
    acenteTahsilatlar:DB.acenteTahsilatlar||[],
    cariler:DB.cariler||[],
    cariHareketler:DB.cariHareketler||[],
    iptallar:DB.iptallar||[],
    hatirlatmalar:DB.hatirlatmalar||[],
    cfg:DB.cfg||{}
  };
  const b=new Blob([JSON.stringify(yedek,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download=`mkoceyedek-${todayISO()}.json`;
  a.click();
  toast('Yedek alındı ✓ — Supabase + JSON');
}

function vYedekYukle(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!confirm('Mevcut tüm Supabase verileri silinip yedek yüklenecek. Devam?'))return;
      toast('Yükleniyor...','info');
      DB.musteriler        = d.musteriler       ||[];
      DB.policeler         = d.policeler        ||[];
      DB.policeTurleri     = d.policeTurleri    ||[];
      DB.acenteler         = d.acenteler        ||[];
      DB.acenteTahsilatlar = d.acenteTahsilatlar||[];
      DB.cariler           = d.cariler          ||[];
      DB.cariHareketler    = d.cariHareketler   ||[];
      DB.iptallar          = d.iptallar         ||[];
      DB.hatirlatmalar     = d.hatirlatmalar    ||[];
      if(d.cfg)DB.cfg={...DB.cfg,...d.cfg};
      // Tüm tabloları Supabase'e yaz
      const sb=getSupa();
      if(sb){
        // Önce temizle
        for(const tbl of Object.values(TBL)){
          await sbDeleteAll(tbl);
        }
      }
      save('musteriler');save('policeler');save('policeTurleri');
      save('acenteler');save('acenteTahsilatlar');
      save('cariler');save('cariHareketler');save('iptallar');save('hatirlatmalar');
      saveObj('cfg');
      const inp=document.getElementById('vImpF');if(inp)inp.value='';
      render();
      toast('Yedek Supabase\'e yüklendi ✓');
    }catch(err){
      toast('Geçersiz dosya! '+err.message,'err');
    }
  };
  r.readAsText(f);
}

async function vSil(){
  if(!confirm('TÜM VERİLER SİLİNECEK (Supabase dahil)! Emin misiniz?'))return;
  if(!confirm('Son uyarı: Bu işlem geri alınamaz!'))return;
  toast('Siliniyor...','warn');
  const sb=getSupa();
  if(sb){
    for(const tbl of Object.values(TBL)){
      await sbDeleteAll(tbl);
    }
  }
  DB.musteriler=[];DB.policeler=[];
  DB.acenteler=[];DB.acenteTahsilatlar=[];
  DB.cariler=[];DB.cariHareketler=[];DB.iptallar=[];DB.hatirlatmalar=[];
  DB.policeTurleri=['1 - TRAFİK SİG.','2 - KASKO SİG.','3 - DASK SİG.','4 - KONUT SİG.','5 - TSS SİG.','6 - İŞ YERİ SİG.','TRAFİK','KASKO','KONUT','DASK','SAĞLIK'];
  save('policeTurleri');
  render();
  toast('Tüm veriler silindi','warn');
}


/* ══ MKÖÇE KASA ══ */
function rKasa(c){
  if(!window._kasaYil)window._kasaYil=new Date().getFullYear().toString();
  if(!window._kasaAy)window._kasaAy='';
  if(!window._kasaGosterim)window._kasaGosterim='aylik';

  const yil=window._kasaYil;
  const ay=window._kasaAy;

  // Filtreler
  const fMus=(window._kasaFMus||'').toLowerCase();
  const fPol=(window._kasaFPol||'').toLowerCase();
  const fPlaka=(window._kasaFPlaka||'').toLowerCase();
  const fBrutMin=parseFloat(window._kasaFBrutMin||0)||0;
  const fBrutMax=parseFloat(window._kasaFBrutMax||0)||0;
  const fNetMin=parseFloat(window._kasaFNetMin||0)||0;
  const fAceMin=parseFloat(window._kasaFAceMin||0)||0;
  const fTarihBas=window._kasaTarihBas||'';
  const fTarihBit=window._kasaTarihBit||'';

  // Poliçe filtrele
  function polFiltre(p){
    const m=getM(p.mId);
    const tanzim=p.tanzim||p.ekTarih||'';
    if(yil&&tanzim&&!tanzim.startsWith(yil))return false;
    if(ay&&tanzim&&tanzim.slice(5,7)!==ay.padStart(2,'0'))return false;
    if(fTarihBas&&tanzim&&tanzim<fTarihBas)return false;
    if(fTarihBit&&tanzim&&tanzim>fTarihBit)return false;
    if(fMus&&m&&!m.unvan.toLowerCase().includes(fMus))return false;
    if(fPol&&!(p.no||'').toLowerCase().includes(fPol))return false;
    if(fPlaka&&!(p.plaka||'').toLowerCase().includes(fPlaka))return false;
    if(fBrutMin&&parseFloat(p.brutTutar||0)<fBrutMin)return false;
    if(fBrutMax&&parseFloat(p.brutTutar||0)>fBrutMax)return false;
    if(fNetMin&&parseFloat(p.netTutar||0)<fNetMin)return false;
    if(fAceMin&&parseFloat(p.komTutar||0)<fAceMin)return false;
    return true;
  }

  // İptal filtrele
  function iptalFiltre(x){
    const tarih=x.iptalTarih||'';
    if(yil&&!tarih.startsWith(yil))return false;
    if(ay&&tarih.slice(5,7)!==ay.padStart(2,'0'))return false;
    if(fTarihBas&&tarih<fTarihBas)return false;
    if(fTarihBit&&tarih>fTarihBit)return false;
    const m=getM(x.mId);
    if(fMus&&m&&!m.unvan.toLowerCase().includes(fMus))return false;
    if(fPol&&!(x.polNo||'').toLowerCase().includes(fPol))return false;
    return true;
  }

  const polList=DB.policeler.filter(polFiltre);
  const iptalList=(DB.iptallar||[]).filter(iptalFiltre);

  // Toplamlar
  const topBrut=polList.reduce((s,p)=>s+parseFloat(p.brutTutar||0),0);
  const topNet=polList.reduce((s,p)=>s+parseFloat(p.netTutar||0),0);
  const topAceKom=polList.reduce((s,p)=>s+parseFloat(p.komTutar||0),0);
  const topIptalSay=iptalList.length;
  const topMkKazanc=iptalList.reduce((s,x)=>s+parseFloat(x.mkKazanc||0),0);
  const topAceBanaKalan=iptalList.reduce((s,x)=>s+parseFloat(x.aceHakKom||0),0);
  const topNetKazanc=topMkKazanc+topAceBanaKalan;

  const ayAd=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

    ...DB.policeler.map(p=>(p.tanzim||p.ekTarih||'').slice(0,4)),

function kasaExcel(){
  toast('Excel dışa aktarma yapılıyor...','info');
  // Basit CSV olarak indir
  const yil=window._kasaYil||new Date().getFullYear();
  const ay=window._kasaAy||'';
  const rows=[['Poliçe No','Müşteri','Şirket','Plaka','Tanzim','Brüt','Net','Ac.Komisyon']];
  DB.policeler.forEach(p=>{
    const t=p.tanzim||p.ekTarih||'';
    if(yil&&!t.startsWith(yil))return;
    if(ay&&t.slice(5,7)!==ay.padStart(2,'0'))return;
    const m=getM(p.mId);
    rows.push([p.no||'',m?m.unvan:'',p.sirket||'',p.plaka||'',fmtDot(t),p.brutTutar||0,p.netTutar||0,p.komTutar||0]);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`mkocekasa-${yil}${ay?'-'+ay:''}.csv`;a.click();
  toast('CSV indirildi ✓');
}

function rHatirlatma(c){
  if(!DB.hatirlatmalar)DB.hatirlatmalar=[];
  const at=window._hatTab||'liste';
  const ug=parseInt(DB.cfg.uyariGun)||30;

  // Otomatik poliçe hatırlatmaları (30 gün içinde bitenler)
  const polHat=DB.policeler.filter(p=>{
    if(p.iptalEdildi)return false;
    const k=kalanGun(p.bit);
    return k!==null&&k>=0&&k<=ug;
  }).sort((a,b)=>a.bit.localeCompare(b.bit));

  const bekleyen=DB.hatirlatmalar.filter(h=>h.durum==='bekliyor').length;
  const tamamlanan=DB.hatirlatmalar.filter(h=>h.durum==='tamam').length;

  c.innerHTML=`<div style="padding:14px">
  <div class="stat-grid" style="grid-template-columns:repeat(auto-fill,minmax(140px,1fr));margin-bottom:12px">
    <div class="stat-box warn"><div class="sv">${polHat.length}</div><div class="sl">🔔 Poliçe Uyarısı</div></div>
    <div class="stat-box danger"><div class="sv">${bekleyen}</div><div class="sl">⏳ Bekleyen</div></div>
    <div class="stat-box ok"><div class="sv">${tamamlanan}</div><div class="sl">✅ Tamamlanan</div></div>
    <div class="stat-box"><div class="sv">${DB.hatirlatmalar.length}</div><div class="sl">📋 Toplam</div></div>
  </div>
  <div class="tabs">
    <button class="tab ${at==='liste'?'on':''}" onclick="window._hatTab='liste';render()">📋 Hatırlatma Listesi</button>

function hatirlatmaListeHTML(){
  if(!DB.hatirlatmalar)DB.hatirlatmalar=[];
  const filtre=window._hatFil||'hepsi';
  const q=(window._hatQ||'').toLowerCase();
  let list=[...DB.hatirlatmalar].sort((a,b)=>{
    // Bekleyenler önce, sonra tarihe göre
    if(a.durum==='bekliyor'&&b.durum!=='bekliyor')return -1;
    if(b.durum==='bekliyor'&&a.durum!=='bekliyor')return 1;
    return(a.tarih||'').localeCompare(b.tarih||'');
  });
  if(filtre==='bekliyor')list=list.filter(h=>h.durum==='bekliyor');
  else if(filtre==='tamam')list=list.filter(h=>h.durum==='tamam');
  else if(filtre==='gecmis')list=list.filter(h=>h.durum==='bekliyor'&&h.tarih&&h.tarih<todayISO());
  if(q)list=list.filter(h=>(h.baslik&&h.baslik.toLowerCase().includes(q))||(h.aciklama&&h.aciklama.toLowerCase().includes(q))||(h.musteri&&h.musteri.toLowerCase().includes(q)));

  const today=todayISO();

  return`<div class="card">
    <div class="card-title"><span>📋</span> Hatırlatma Listesi <span class="badge badge-gray" style="margin-left:auto">${list.length} kayıt</span></div>
    <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:10px">
      <input placeholder="🔍 Başlık, açıklama, müşteri..." value="${window._hatQ||''}"
        oninput="window._hatQ=this.value;_dRender()"
        style="flex:1;min-width:160px;padding:7px 9px;background:#f0fdf4;border:1.5px solid var(--brd2);border-radius:6px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600">
      <select style="width:auto" onchange="window._hatFil=this.value;render()">
        <option value="hepsi" ${filtre==='hepsi'?'selected':''}>Tümü</option>
        <option value="bekliyor" ${filtre==='bekliyor'?'selected':''}>Bekleyenler</option>
        <option value="gecmis" ${filtre==='gecmis'?'selected':''}>Tarihi Geçenler</option>
        <option value="tamam" ${filtre==='tamam'?'selected':''}>Tamamlananlar</option>
      </select>
    </div>
    ${list.length?`<div style="display:flex;flex-direction:column;gap:8px">
    ${list.map(h=>{
      const gecmis=h.durum==='bekliyor'&&h.tarih&&h.tarih<today;
      const bugun=h.tarih===today;
      const m=h.mId?getM(h.mId):null;
      const oncelikRenk={yuksek:'var(--err)',orta:'var(--warn)',dusuk:'var(--ok)'}[h.oncelik]||'var(--muted)';
      return`<div style="background:${h.durum==='tamam'?'#f8fafc':gecmis?'#fff1f2':bugun?'#fffbeb':'#fff'};border:2px solid ${h.durum==='tamam'?'var(--brd)':gecmis?'#fca5a5':bugun?'#fcd34d':'var(--brd)'};border-radius:10px;padding:12px;transition:all .15s">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap">
              <span style="font-weight:900;font-size:13px;color:${h.durum==='tamam'?'var(--muted)':'var(--txt)'};${h.durum==='tamam'?'text-decoration:line-through':''}">${h.baslik||'(Başlıksız)'}</span>
              <span style="background:${oncelikRenk};color:#fff;border-radius:20px;padding:1px 7px;font-size:9px;font-weight:800">${h.oncelik==='yuksek'?'🔴 Yüksek':h.oncelik==='orta'?'🟡 Orta':'🟢 Düşük'}</span>
              ${gecmis?'<span class="badge badge-err">⚠ Gecikmiş</span>':bugun?'<span class="badge badge-warn">📅 Bugün</span>':''}
              ${h.durum==='tamam'?'<span class="badge badge-ok">✅ Tamam</span>':''}
            </div>
            ${h.aciklama?`<div style="font-size:11.5px;color:var(--muted);margin-bottom:5px">${h.aciklama}</div>`:''}
            <div style="display:flex;gap:10px;flex-wrap:wrap;font-size:10.5px;color:var(--muted)">
              ${h.tarih?`<span>📅 ${fmtDot(h.tarih)}</span>`:''}
              ${m?`<span>👤 ${m.unvan}</span>`:''}
              ${h.policeNo?`<span>📋 ${h.policeNo}</span>`:''}
              ${h.sirket?`<span>🏢 ${h.sirket}</span>`:''}
              ${h.plaka?`<span>🚗 ${h.plaka}</span>`:''}
              ${h.belgeSeri?`<span>🔖 ${h.belgeSeri}</span>`:''}
              ${h.bas?`<span>📅 ${fmtDot(h.bas)} → ${fmtDot(h.bit)}</span>`:''}
              ${h.tur?`<span>🏷️ ${h.tur}</span>`:''}
            </div>
          </div>
          <div style="display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap">
            ${h.durum==='bekliyor'?`<button class="btn btn-success btn-xs" onclick="hatTamam('${h.id}')">✓ Tamam</button>`:''}
            <button class="btn btn-ghost btn-xs" onclick="hatDuzenle('${h.id}')">Düzenle</button>

          </div>
        </div>
      </div>`;

  </div>`;

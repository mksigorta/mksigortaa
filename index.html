window.hatPolDoldur=function(polId){
  if(!polId){return;}
  const p=getP(polId);if(!p)return;
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};
  set('htPolNo', p.no||'');
  set('htSirket', p.sirket||'');
  set('htPlaka',  p.plaka||'');
  set('htBas',    p.bas||'');
  set('htBit',    p.bit||'');
  // Başlığı otomatik oluştur
  const m=getM(p.mId);
  const basEl=document.getElementById('htBaslik');
  if(basEl&&!basEl.value){
    basEl.value=`Poliçe Yenileme — ${p.no||''} ${p.tur||''} ${m?'('+m.unvan+')':''}`.trim();
  }
  // Bitiş tarihini hatırlatma tarihi olarak da set et (htBit = htTarih yok artık — Bitiş Tarihi var)
};

function hatirlatmaPoliceHTML(polHat){
  if(!polHat.length)return`<div class="card"><div class="empty"><div class="ei">✅</div><p>Yaklaşan poliçe uyarısı yok</p></div></div>`;
  const ug=parseInt(DB.cfg.uyariGun)||30;
  return`<div class="card">
    <div class="card-title"><span>🔔</span> ${ug} Gün İçinde Bitecek Poliçeler <span class="badge badge-warn" style="margin-left:auto">${polHat.length}</span></div>
    <div style="display:flex;flex-direction:column;gap:6px">
    ${polHat.map(p=>{
      const m=getM(p.mId);const k=kalanGun(p.bit);
      const cls=k<=7?'var(--err)':k<=30?'var(--warn)':'var(--ok)';
      return`<div style="background:#fff;border:2px solid ${cls};border-radius:10px;padding:11px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-weight:900;font-size:12px;font-family:'JetBrains Mono',monospace">${p.no||'—'} <span style="font-family:'Nunito',sans-serif;font-size:10px;font-weight:600;color:var(--muted)">${p.tur||''}</span></div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">${m?m.unvan:'—'} · ${p.plaka||'Plakasız'} · ${fmtDot(p.bas)} → ${fmtDot(p.bit)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:13px;font-weight:900;color:${cls}">${k===0?'Bugün Bitiyor':k+'Gün Kaldı'}</span>
          <button class="btn btn-primary btn-xs" onclick="polDetay('${p.id}')">Bilgi</button>
          <button class="btn btn-success btn-xs" onclick="hatirlatmaEklePolice('${p.id}')">+ Hatırlatma</button>
        </div>
      </div>`;
    }).join('')}
    </div>
  </div>`;
}

function hatKaydet(){
  if(!DB.hatirlatmalar)DB.hatirlatmalar=[];
  const baslik=document.getElementById('htBaslik')?.value.trim();
  if(!baslik){toast('Başlık zorunlu!','err');return;}
  const mId=document.getElementById('htMus')?.value||'';
  const polId=document.getElementById('htPol')?.value||'';
  const bas=document.getElementById('htBas')?.value||'';
  const bit=document.getElementById('htBit')?.value||'';
  const h={id:uid(),baslik,
    bas,bit,
    oncelik:document.getElementById('htOncelik')?.value||'orta',
    tur:document.getElementById('htTur')?.value||'',
    mId,
    policeNo:document.getElementById('htPolNo')?.value||'',
    sirket:document.getElementById('htSirket')?.value||'',
    plaka:document.getElementById('htPlaka')?.value||'',
    belgeSeri:document.getElementById('htBelgeSeri')?.value||'',
    musteri:mId?(getM(mId)||{}).unvan||'':'',
    aciklama:document.getElementById('htAck')?.value||'',
    durum:'bekliyor',ekTarih:todayISO()};
  DB.hatirlatmalar.push(h);
  saveOne('hatirlatmalar',h);
  window._hatMusSel='';window._hatPolSel='';window._hatBaslik='';
  window._hatTab='liste';
  toast('Hatırlatma eklendi ✓');
  render();
}

function hatTamam(id){
  const h=(DB.hatirlatmalar||[]).find(x=>x.id===id);if(!h)return;
  h.durum=h.durum==='tamam'?'bekliyor':'tamam';
  h.tamamTarih=h.durum==='tamam'?todayISO():'';
  save('hatirlatmalar');
  toast(h.durum==='tamam'?'Tamamlandı ✓':'Yeniden açıldı','info');
  render();
}

function hatDuzenle(id){
  const h=(DB.hatirlatmalar||[]).find(x=>x.id===id);if(!h)return;
  const musOpts=DB.musteriler.slice().sort((a,b)=>a.unvan.localeCompare(b.unvan,'tr')).map(m=>`<option value="${m.id}" ${h.mId===m.id?'selected':''}>${m.unvan}</option>`).join('');
  openModal('✏️ Hatırlatma Düzenle',`
    <div style="margin-bottom:8px"><label class="lbl">Başlık *</label><input id="edHtB" value="${h.baslik||''}"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div><label class="lbl">Tarih</label><input id="edHtT" type="date" value="${h.tarih||''}"></div>
      <div><label class="lbl">Öncelik</label>
        <select id="edHtO">
          <option value="yuksek" ${h.oncelik==='yuksek'?'selected':''}>🔴 Yüksek</option>
          <option value="orta" ${h.oncelik==='orta'?'selected':''}>🟡 Orta</option>
          <option value="dusuk" ${h.oncelik==='dusuk'?'selected':''}>🟢 Düşük</option>
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div><label class="lbl">Tür</label>
        <select id="edHtTur">
          ${['','Poliçe Yenileme','Tahsilat','Müşteri Araması','Belge Teslimi','Diğer'].map(t=>`<option ${h.tur===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div><label class="lbl">Müşteri</label>
        <select id="edHtM"><option value="">—</option>${musOpts}</select>
      </div>
    </div>
    <div style="margin-bottom:8px"><label class="lbl">Poliçe No</label><input id="edHtPN" value="${h.policeNo||''}"></div>
    <div><label class="lbl">Açıklama</label><textarea id="edHtA">${h.aciklama||''}</textarea></div>
  `,()=>{
    const b=document.getElementById('edHtB')?.value.trim();
    if(!b){toast('Başlık zorunlu!','err');return;}
    h.baslik=b;h.tarih=document.getElementById('edHtT')?.value||h.tarih;
    h.oncelik=document.getElementById('edHtO')?.value||h.oncelik;
    h.tur=document.getElementById('edHtTur')?.value||'';
    h.mId=document.getElementById('edHtM')?.value||'';
    h.musteri=h.mId?(getM(h.mId)||{}).unvan||'':'';
    h.policeNo=document.getElementById('edHtPN')?.value||'';
    h.aciklama=document.getElementById('edHtA')?.value||'';
    save('hatirlatmalar');
    closeModal();toast('Güncellendi ✓');render();
  },true);
}

function hatSil(id){
  openModal('Hatırlatma Sil',`<div class="alert alert-err"><span>⚠️</span><span>Bu hatırlatma silinecek. Emin misiniz?</span></div>`,()=>{
    DB.hatirlatmalar=(DB.hatirlatmalar||[]).filter(x=>x.id!==id);
    save('hatirlatmalar');closeModal();toast('Silindi','warn');render();
  });
}

function hatirlatmaEklePolice(polId){
  const p=getP(polId);if(!p)return;
  const m=getM(p.mId);
  if(!DB.hatirlatmalar)DB.hatirlatmalar=[];
  const h={id:uid(),
    baslik:`Poliçe Yenileme — ${p.no||'—'} ${p.tur||''} ${m?'('+m.unvan+')':''}`,
    tarih:p.bit||todayISO(),
    oncelik:kalanGun(p.bit)<=7?'yuksek':'orta',
    tur:'Poliçe Yenileme',
    mId:p.mId||'',musteri:m?m.unvan:'',
    policeNo:p.no||'',
    aciklama:`Poliçe bitiş: ${fmtDot(p.bit)} · Plaka: ${p.plaka||'—'} · Brüt: ${fmt2(p.brutTutar||0)}₺`,
    durum:'bekliyor',ekTarih:todayISO()};
  DB.hatirlatmalar.push(h);
  saveOne('hatirlatmalar',h);
  toast('Hatırlatma eklendi ✓');
  window._hatTab='liste';render();
}

  c.innerHTML=`<div style="padding:14px">

window.itMusChange=function(){
  const mId=document.getElementById('itMus')?.value;
  const sel=document.getElementById('itPol');
  if(!sel)return;
  if(!mId){sel.innerHTML='<option value="">— Önce müşteri seçin —</option>';return;}
  const pols=DB.policeler.filter(p=>p.mId===mId&&!p.iptalEdildi);
  sel.innerHTML='<option value="">— Poliçe Seçiniz —</option>'+
    pols.map(p=>`<option value="${p.id}">${p.no||'(No yok)'} — ${p.tur||''} — ${fmtDot(p.bas)}→${fmtDot(p.bit)}</option>`).join('');
  itPolChange();
};

window.itPolChange=function(){
  const polId=document.getElementById('itPol')?.value;
  const fields=['Tur','Sirket','Bas','Bit','Brut','Net','AceKom','AceOran'];
  if(!polId){
    fields.forEach(f=>{const el=document.getElementById('it'+f);if(el)el.value='';});
    itHesapla();return;
  }
  const p=getP(polId);if(!p)return;
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};
  set('itTur',p.tur||'');
  set('itSirket',p.sirket||'');
  set('itBas',p.bas||'');
  set('itBit',p.bit||'');
  set('itBrut',fmt2(p.brutTutar||p.tahsilat||0)+'₺');
  set('itNet',fmt2(p.netTutar||0)+'₺');
  set('itAceKom',fmt2(p.komTutar||0)+'₺');
  set('itAceOran',(p.komOran||0)+'%');
  // Poliçeden acenteyi otomatik seç
  const aceEl=document.getElementById('itAce');
  if(aceEl&&p.aceId){aceEl.value=p.aceId;}
  itHesapla();
};

window.itHesapla=function(){
  const polId=document.getElementById('itPol')?.value;
  const iptalTarih=document.getElementById('itTarih')?.value;
  const mkIade=parseFloat(document.getElementById('itMkIade')?.value||0);

  const setText=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  const setVal=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};

  if(!polId||!iptalTarih){
    ['f1Brut','f1Iade','f1Calisan','f2Brut','f2Calisan','f3Cal1','f3Cal2','f3Kazanc','f4AceIade','f4MkKazanc','f5GunKom','f5AceIade','f5AceHak'].forEach(id=>setText(id,'—'));
    ['itKulGun','itKalGun','itGunTutar','itPolIade','itCalGun'].forEach(id=>setVal(id,''));
    const ok=document.getElementById('itOzetKart');if(ok)ok.style.display='none';
    return;
  }

  const p=getP(polId);if(!p)return;
  const brut=parseFloat(p.brutTutar||p.tahsilat||0);
  const aceKom=parseFloat(p.komTutar||0);

  const tBas=new Date(p.bas);
  const tBit=new Date(p.bit);
  const tIptal=new Date(iptalTarih);

  // Gün hesapları
  const kulGun=Math.max(0,Math.round((tIptal-tBas)/86400000));
  const kalGun=Math.max(0,Math.round((tBit-tIptal)/86400000));
  const topGun=Math.max(1,Math.round((tBit-tBas)/86400000));

  const gunTutar=brut/365;
  const polIade=kalGun*gunTutar;         // Gerçek iade
  const calGun=kulGun*gunTutar;          // Gerçek çalışan gün tutarı
  const gercekCalisan=brut-polIade;       // 1. Formül çalışan

  // 2. Formül
  const mkCalisan=brut-mkIade;

  // 3. Formül kazanç
  const kazanc=mkCalisan-gercekCalisan;

  // Acente komisyon
  const aceGunKom=aceKom/365;
  const aceIade=kalGun*aceGunKom;        // Acente iade (kalan gün)
  const aceHak=kulGun*aceGunKom;         // Acenteden hak edilen (kullanılan gün)

  // 4. Formül MK Kazanç
  const mkKazanc=kazanc-aceIade;

  // Güncelle — gün alanları
  setVal('itKulGun',kulGun+' gün');
  setVal('itKalGun',kalGun+' gün');
  setVal('itGunTutar',fmt2(gunTutar)+'₺');
  setVal('itPolIade',fmt2(polIade)+'₺');
  setVal('itCalGun',fmt2(calGun)+'₺');

  // 1. Formül
  setText('f1Brut',fmt2(brut)+'₺');
  setText('f1Iade',fmt2(polIade)+'₺');
  setText('f1Calisan',fmt2(gercekCalisan)+'₺');

  // 2. Formül
  setText('f2Brut',fmt2(brut)+'₺');
  setText('f2Calisan',fmt2(mkCalisan)+'₺');

  // 3 & 4. Formül
  setText('f3Cal1',fmt2(gercekCalisan)+'₺');
  setText('f3Cal2',fmt2(mkCalisan)+'₺');
  setText('f3Kazanc',fmt2(kazanc)+'₺');
  setText('f4AceIade',fmt2(aceIade)+'₺');
  setText('f4MkKazanc',fmt2(mkKazanc)+'₺');

  // 5. Formül
  setText('f5GunKom',fmt2(aceGunKom)+'₺');
  setText('f5AceIade',fmt2(aceIade)+'₺');
  setText('f5AceHak',fmt2(aceHak)+'₺');

  // Acente alacak bilgi kutusu güncelle
  const aceEl2=document.getElementById('itAce');
  const aceAlacakBilgi=document.getElementById('f5AceAlacakBilgi');
  const aceAlacakTutar=document.getElementById('f5AceAlacakTutar');
  if(aceAlacakBilgi&&aceAlacakTutar){
    const selAceId=aceEl2?aceEl2.value:'';
    const selAce=selAceId?(DB.acenteler||[]).find(a=>a.id===selAceId):null;
    if(selAce&&aceIade>0){
      aceAlacakBilgi.style.display='block';
      aceAlacakTutar.textContent=fmt2(aceIade)+'₺ ('+selAce.unvan+')';
    } else {
      aceAlacakBilgi.style.display='none';
    }
  }

  // ÖZET TABLO güncelle
  const ok=document.getElementById('itOzetKart');
  if(ok){
    ok.style.display='block';
    const so=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
    so('ozBrut',     fmt2(brut)+'₺');
    so('ozNet',      fmt2(parseFloat(p.netTutar||0))+'₺');
    so('ozGercekCal',fmt2(gercekCalisan)+'₺');
    so('ozMkCal',    fmt2(mkCalisan)+'₺');
    so('ozGercekIade',fmt2(polIade)+'₺');
    so('ozMkIade',   mkIade>0?fmt2(mkIade)+'₺':'— (girilmedi)');
    so('ozAceKom',   fmt2(aceKom)+'₺');
    so('ozAceHak',   fmt2(aceHak)+'₺');
    so('ozAceIade',  fmt2(aceIade)+'₺');
    so('ozKazanc',   fmt2(kazanc)+'₺');
    so('ozMkKazanc', fmt2(mkKazanc)+'₺');
  }

  // Global sakla (kaydet için)
  window._itCalc={brut,netTutar:parseFloat(p.netTutar||0),aceKom,aceOran:p.komOran||0,
    kulGun,kalGun,gunTutar,polIade,calGun,gercekCalisan,mkIade,mkCalisan,kazanc,
    aceGunKom,aceIade,aceHak,mkKazanc};
};

function itKaydet(){
  if(!DB.iptallar)DB.iptallar=[];
  if(!DB.cariHareketler)DB.cariHareketler=[];
  if(!DB.cariler)DB.cariler=[];

  const mId=document.getElementById('itMus')?.value;
  const polId=document.getElementById('itPol')?.value;
  const sebep=document.getElementById('itSebep')?.value;
  const iptalTarih=document.getElementById('itTarih')?.value;
  const mkIadeEl=parseFloat(document.getElementById('itMkIade')?.value||0);

  if(!mId){toast('Müşteri seçiniz!','err');return;}
  if(!polId){toast('Poliçe seçiniz!','err');return;}
  if(!sebep){toast('İptal sebebi seçiniz!','err');return;}
  if(!iptalTarih){toast('İptal tarihi giriniz!','err');return;}
  if(!window._itCalc){toast('Hesaplama yapılmadı!','err');return;}

  const c=window._itCalc;
  const p=getP(polId);
  const mus=getM(mId);
  // Seçili acente: önce formdan, yoksa poliçeden
  const itAceId=document.getElementById('itAce')?.value||p.aceId||'';
  const ace=itAceId?getA(itAceId):null;

  // Poliçeyi iptal edildi olarak işaretle
  p.iptalEdildi=true;
  p.iptalTarih=iptalTarih;
  p.iptalSebep=sebep;
  save('policeler');

  // Kayıt
  const kayit={id:uid(),mId,polId,polNo:p.no||'',aceId:itAceId||'',
    sebep,iptalTarih,
    brut:c.brut,netTutar:c.netTutar,aceKom:c.aceKom,aceOran:c.aceOran,
    kulGun:c.kulGun,kalGun:c.kalGun,gunTutar:c.gunTutar,
    gercekIadeTutar:c.polIade,calGunTutar:c.calGun,
    gercekCalisan:c.gercekCalisan,
    mkIadeTutar:mkIadeEl,mkCalisan:c.mkCalisan,
    kazanc:c.kazanc,
    aceGunKom:c.aceGunKom,aceIadeTutar:c.aceIade,aceHakKom:c.aceHak,
    mkKazanc:c.mkKazanc,
    noterAd:document.getElementById('itNoterAd')?.value||'',
    noterNo:document.getElementById('itNoterNo')?.value||'',
    ekTarih:todayISO()};
  DB.iptallar.push(kayit);saveOne('iptallar',kayit);

  // CARİ: Müşteriye alacak (MK isteğe bağlı iade)
  if(mkIadeEl>0&&mus){
    let cari=(DB.cariler||[]).find(x=>x.mId===mId);
    if(!cari){
      cari={id:uid(),mId,unvan:mus.unvan,tur:'Müşteri',yetkili:'',tel:mus.tel1||'',
        email:'',vergi:mus.vergi||'',sehir:mus.sehir||'',adres:mus.adres||'',not:'',ekTarih:todayISO()};
      DB.cariler.push(cari);saveOne('cariler',cari);
    }
    DB.cariHareketler.push({id:uid(),cId:cari.id,tip:'alacak',tarih:iptalTarih,
      tutar:mkIadeEl,yontem:'İptal İadesi',belge:p.no||'',
      aciklama:`İptal İadesi — ${sebep} — Poliçe: ${p.no||'—'}`});
    save('cariHareketler');
  }

  // ACENTE TAHSİLAT: Komisyon iadesi → sadece acenteTahsilatlar'a yaz (cari harekete YAZMA)
  if(c.aceIade>0&&ace){
    if(!DB.acenteTahsilatlar)DB.acenteTahsilatlar=[];
    // Negatif tutar = iptal iade borcu (acentenin bize ödemesi gereken)
    DB.acenteTahsilatlar.push({id:uid(),aceId:ace.id,tarih:iptalTarih,
      tutar:-Math.abs(c.aceIade),yontem:'İptal Komisyon İadesi',
      aciklama:`İptal Kom. İadesi — Poliçe: ${p.no||'—'} — ${sebep}`});
    save('acenteTahsilatlar');
  }

  toast('Poliçe iptal kaydedildi ✓');
  window._itCalc=null;
  window._iptalTab='liste';
  render();
}

function iptalListeHTML(){
  if(!DB.iptallar)return`<div class="card"><div class="empty"><div class="ei">🚫</div><p>Henüz iptal kaydı yok</p></div></div>`;
  const iq=(window._itQ||'').toLowerCase();
  const iMus=window._itMusFil||'';
  const iTarihBas=window._itTarihBas||'';
  const iTarihBit=window._itTarihBit||'';
  let list=[...DB.iptallar].sort((a,b)=>b.iptalTarih.localeCompare(a.iptalTarih));
  if(iq)list=list.filter(x=>{const m=getM(x.mId);return(x.polNo&&x.polNo.toLowerCase().includes(iq))||(m&&m.unvan.toLowerCase().includes(iq))||(x.sebep&&x.sebep.toLowerCase().includes(iq))||(x.noterAd&&x.noterAd.toLowerCase().includes(iq));});
  if(iMus)list=list.filter(x=>x.mId===iMus);
  if(iTarihBas)list=list.filter(x=>x.iptalTarih>=iTarihBas);
  if(iTarihBit)list=list.filter(x=>x.iptalTarih<=iTarihBit);

  const musOpts=DB.musteriler.slice().sort((a,b)=>a.unvan.localeCompare(b.unvan,'tr')).map(m=>`<option value="${m.id}" ${iMus===m.id?'selected':''}>${m.unvan}</option>`).join('');

  return`<div class="card">
    <div class="card-title"><span>🚫</span> İptal & İade Listesi <span class="badge badge-gray" style="margin-left:auto">${list.length} / ${DB.iptallar.length} kayıt</span></div>
    <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:10px">
      <input placeholder="🔍 Müşteri, Poliçe No, Sebep, Noter..." value="${window._itQ||''}"
        oninput="window._itQ=this.value;_dRender()"
        style="flex:1;min-width:180px;padding:7px 9px;background:#f0fdf4;border:1.5px solid var(--brd2);border-radius:6px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600">
      <select style="width:auto" onchange="window._itMusFil=this.value;render()">
        <option value="">Tüm Müşteriler</option>
        ${musOpts}
      </select>
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:700;color:var(--muted)">Tarih:</span>
        <input type="date" value="${iTarihBas}" onchange="window._itTarihBas=this.value;render()"
          style="width:135px;padding:6px 8px;background:#f0fdf4;border:1.5px solid var(--brd2);border-radius:6px;font-family:'Nunito',sans-serif;font-size:11px">
        <span style="font-size:11px;color:var(--muted)">—</span>
        <input type="date" value="${iTarihBit}" onchange="window._itTarihBit=this.value;render()"
          style="width:135px;padding:6px 8px;background:#f0fdf4;border:1.5px solid var(--brd2);border-radius:6px;font-family:'Nunito',sans-serif;font-size:11px">
        ${(iq||iMus||iTarihBas||iTarihBit)?`<button class="btn btn-ghost btn-sm" onclick="window._itQ='';window._itMusFil='';window._itTarihBas='';window._itTarihBit='';render()">✕ Temizle</button>`:''}
      </div>
    </div>
    ${list.length?`<div class="twrap"><table>
      <thead><tr>
        <th>İptal Tarihi</th><th>Müşteri</th><th>Poliçe No</th><th>İptal Sebebi</th>
        <th>Kul. Gün</th><th>Kal. Gün</th>
        <th>Brüt Tutar</th><th>Gerçek İade</th><th>MK İade</th>
        <th>Kazanç</th><th>MK Kazanç</th><th>İşlem</th>
      </tr></thead>
      <tbody>${list.map(x=>{
        const m=getM(x.mId);
        return`<tr>
          <td><strong>${fmtDot(x.iptalTarih)}</strong></td>
          <td>${m?m.unvan:'—'}</td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:10.5px">${x.polNo||'—'}</td>
          <td><span class="badge badge-warn">${x.sebep||'—'}</span></td>
          <td>${x.kulGun}</td>
          <td>${x.kalGun}</td>
          <td style="font-family:'JetBrains Mono',monospace">${fmt2(x.brut)}₺</td>
          <td style="font-family:'JetBrains Mono',monospace;color:var(--err)">${fmt2(x.gercekIadeTutar)}₺</td>
          <td style="font-family:'JetBrains Mono',monospace;color:var(--acc)">${fmt2(x.mkIadeTutar)}₺</td>
          <td style="font-family:'JetBrains Mono',monospace;color:var(--ok)">${fmt2(x.kazanc)}₺</td>
          <td style="font-family:'JetBrains Mono',monospace;font-weight:900;color:#15803d">${fmt2(x.mkKazanc)}₺</td>
          <td class="tdact">
            <button class="btn btn-primary btn-xs" onclick="iptalDetay('${x.id}')">Detay</button>
            <button class="btn btn-ghost btn-xs" onclick="iptalDuzenle('${x.id}')">Düzenle</button>
            <button class="btn btn-danger btn-xs" onclick="iptalSil('${x.id}')">Sil</button>
          </td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>`:`<div class="empty"><div class="ei">🚫</div><p>Sonuç bulunamadı</p></div>`}
  </div>`;
}

function iptalDuzenle(id){
  const x=(DB.iptallar||[]).find(i=>i.id===id);if(!x)return;
  const acenteOptsIptal=(DB.acenteler||[]).slice().sort((a,b)=>a.unvan.localeCompare(b.unvan,'tr'))
    .map(a=>`<option value="${a.id}" ${x.aceId===a.id?'selected':''}>${a.unvan}</option>`).join('');
  openModal('✏️ İptal Kaydı Düzenle',`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div><label class="lbl">İptal Tarihi</label><input id="edItTarih" type="date" value="${x.iptalTarih||''}"></div>
      <div><label class="lbl">İptal Sebebi</label>
        <select id="edItSebep">
          <option value="">— Seçiniz —</option>
          ${['Araç Satışı','Başlangıçtan İptal','Müşteri İsteğine Bağlı','Diğer'].map(s=>`<option ${x.sebep===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div><label class="lbl">MK İsteğe Bağlı İade (₺)</label>
        <input id="edItMkIade" type="number" step="0.01" value="${x.mkIadeTutar||0}" style="font-weight:800;border:2px solid #059669">
      </div>
      <div><label class="lbl">Acente</label>
        <select id="edItAce"><option value="">— Yok —</option>${acenteOptsIptal}</select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div><label class="lbl">Noter Adı</label><input id="edItNoterAd" value="${x.noterAd||''}" placeholder="Noter adı..."></div>
      <div><label class="lbl">Noter Numarası</label><input id="edItNoterNo" value="${x.noterNo||''}" placeholder="Noter numarası..."></div>
    </div>
    <div style="background:#fef3c7;border:1.5px solid #fcd34d;border-radius:6px;padding:9px;font-size:11px;color:#92400e;font-weight:700">
      ⚠️ Hesaplama değerleri (brüt tutar, gün sayıları vb.) değiştirilmez. Sadece yukarıdaki alanlar güncellenir.
    </div>
  `,()=>{
    const tarih=document.getElementById('edItTarih')?.value||x.iptalTarih;
    const sebep=document.getElementById('edItSebep')?.value||x.sebep;
    const mkIade=parseFloat(document.getElementById('edItMkIade')?.value||0);
    const aceId=document.getElementById('edItAce')?.value||'';
    const noterAd=document.getElementById('edItNoterAd')?.value||'';
    const noterNo=document.getElementById('edItNoterNo')?.value||'';
    if(!sebep){toast('İptal sebebi seçiniz!','err');return;}

    x.iptalTarih=tarih;
    x.sebep=sebep;
    x.mkIadeTutar=mkIade;
    x.aceId=aceId;
    x.noterAd=noterAd;
    x.noterNo=noterNo;

    // Poliçe üzerindeki iptal tarih/sebep güncelle
    const p=getP(x.polId);
    if(p){p.iptalTarih=tarih;p.iptalSebep=sebep;save('policeler');}

    save('iptallar');
    closeModal();toast('İptal kaydı güncellendi ✓');render();
  },true);
}

function iptalDetay(id){
  const x=(DB.iptallar||[]).find(i=>i.id===id);if(!x)return;
  const m=getM(x.mId);const ace=x.aceId?getA(x.aceId):null;
  const drow=(lbl,val,cls)=>`<div class="drow"><span class="dk">${lbl}</span><span class="dv" style="font-family:'JetBrains Mono',monospace${cls?';color:'+cls:''}">${val}</span></div>`;
  openDrawer(`🚫 İptal Detayı — ${x.polNo||'—'}`,`
    <div class="dsec"><h4>📋 Genel</h4>
      ${drow('Müşteri',m?m.unvan:'—',null)}
      ${drow('Poliçe No',x.polNo||'—',null)}
      ${drow('İptal Sebebi',x.sebep||'—',null)}
      ${drow('İptal Tarihi',fmtDot(x.iptalTarih),null)}
      ${drow('Noter Adı',x.noterAd||'—',null)}
      ${drow('Noter Numarası',x.noterNo||'—',null)}
      ${drow('Kullanılan Gün',x.kulGun+' gün',null)}
      ${drow('Kalan Gün',x.kalGun+' gün',null)}
      ${drow('Günlük Tutar',fmt2(x.gunTutar)+'₺','var(--acc)')}
    </div>
    <div class="dsec"><h4>💰 Poliçe Bilgileri</h4>
      ${drow('Brüt Tutar',fmt2(x.brut)+'₺','var(--acc)')}
      ${drow('Net Tutar',fmt2(x.netTutar)+'₺',null)}
      ${drow('Acente Komisyonu',fmt2(x.aceKom)+'₺','var(--warn)')}
      ${drow('Acente Kom. Oranı',x.aceOran+'%',null)}
    </div>
    <div class="dsec"><h4>📊 1. Formül — Gerçek İade</h4>
      ${drow('Poliçe İadesi (Kalan Gün × Günlük)',fmt2(x.gercekIadeTutar)+'₺','var(--err)')}
      ${drow('Gerçek Çalışan Tutar',fmt2(x.gercekCalisan)+'₺','var(--ok)')}
    </div>
    <div class="dsec"><h4>💡 2. Formül — MK İade</h4>
      ${drow('MK İsteğe Bağlı İade',fmt2(x.mkIadeTutar)+'₺','var(--acc)')}
      ${drow('MK Çalışan Tutar',fmt2(x.mkCalisan)+'₺','#2563eb')}
    </div>
    <div class="dsec"><h4>💰 3 & 4. Formül — Kazanç</h4>
      ${drow('Kazanç (F2 - F1)',fmt2(x.kazanc)+'₺','var(--ok)')}
      ${drow('Acente Komisyon İadesi',fmt2(x.aceIadeTutar)+'₺','var(--err)')}
      ${drow('MKÖÇE KAZANÇ',fmt2(x.mkKazanc)+'₺','#15803d')}
    </div>
    <div class="dsec"><h4>🏢 5. Formül — Acente Komisyon</h4>
      ${drow('Acente Günlük Komisyon',fmt2(x.aceGunKom)+'₺',null)}
      ${drow('Acente Komisyon İadesi',fmt2(x.aceIadeTutar)+'₺','var(--err)')}
      ${drow('Acenteden Hak Edilen Komisyon',fmt2(x.aceHakKom)+'₺','var(--ok)')}
    </div>
    <div class="bgrp"><button class="btn btn-ghost" onclick="closeDrawer()">Kapat</button></div>`);
}

function iptalSil(id){
  openModal('⚠️ İptal Kaydı Sil',`
    <div class="alert alert-err"><span>⚠️</span><span>Bu iptal kaydı silinecek. Poliçe yeniden aktif hale gelecek. Emin misiniz?</span></div>
  `,()=>{
    const x=(DB.iptallar||[]).find(i=>i.id===id);
    if(x){
      const p=getP(x.polId);if(p){p.iptalEdildi=false;p.iptalTarih='';p.iptalSebep='';save('policeler');}
    }
    DB.iptallar=(DB.iptallar||[]).filter(i=>i.id!==id);
    deleteOne('iptallar',id);render();closeModal();toast('İptal kaydı silindi','warn');
  });
}

/* ── BAŞLAT ── */
render();
</script>
</body>
</html>
